  <script>
    // 同步 select 选项
    function syncSelect(value) {
      var selectElement = document.getElementById("huiyuanguize");
      selectElement.value = value;
    }

    // 同步单选按钮
    function syncRadioFromSelect() {
      var selectElement = document.getElementById("huiyuanguize");
      var selectedValue = selectElement.value;
      var radioButton = document.getElementById("radio-" + selectedValue);

      if (radioButton) {
        radioButton.checked = true;
      }
    }

    // 同步select下拉框
    function syncSelectFromRadio() {
      var radioButtons = document.getElementsByName("membership");
      var selectElement = document.getElementById("huiyuanguize");

      for (var i = 0; i < radioButtons.length; i++) {
        if (radioButtons[i].checked) {
          selectElement.value = radioButtons[i].value;
          break;
        }
      }
    }

    // 定义一个函数，用于更新 checkbox 的 checked 属性
    function updateCheckboxChecked() {
      const checkbox = document.getElementById('lingqu3');
      if (!checkbox) return;

      const now = new Date();
      const hours = now.getHours();

      // ✅ 注释纠正：实际逻辑是 8:00-22:00
      if (hours >= 7 && hours < 24) {
        checkbox.checked = true;
      } else {
        checkbox.checked = false;
      }
    }

    // 页面加载时执行一次
    updateCheckboxChecked();
    // 每分钟检查一次
    setInterval(updateCheckboxChecked, 60000);

    chongzhitype = "";
    token = getQueryVariable('token');
    document.getElementById('tokenID').value = token;

    function getQueryVariable(variable) {
      var query = window.location.search.substring(1);
      var vars = query.split("&");
      for (var i = 0; i < vars.length; i++) {
        var pair = vars[i].split("=");
        if (pair[0] == variable) {
          // ✅ decode，避免 token/参数被编码后取值不正确
          return decodeURIComponent(pair[1] || '');
        }
      }
      return ('');
    }

    // ✅ 保留这一份 confirmSelection（删除了上面那份 alert 版本，避免函数覆盖）
    function confirmSelection() {
      var zhanghu = document.getElementById("zhanghu").value;
      var zhanghuText = document.getElementById("zhanghu").options[document.getElementById("zhanghu").selectedIndex].text;

      layer.confirm('确认账户：' + zhanghuText + '<br>' + '&nbsp;'.repeat(35), {
        btn: ['重选', '确定']
      },
        function () {
          layer.closeAll();
        }, function () {
          fasong();
          layer.msg("提交成功");
          loadRecords();
        });
    }

    function fasong() {
      var token = document.getElementById("tokenID").value;
      var UrlsID = document.getElementById("UrlsID").value;
      var orderID = document.getElementById("orderID").value;
      var zhanghu = document.getElementById("zhanghu").value;
      var huiyuanguize = document.getElementById("huiyuanguize").value;
      var lingqu3 = document.getElementById("lingqu3").checked;
      var shougong = document.getElementById("shougong").checked;
      var qdzhb = document.getElementById("qdzhb").checked;
      var applogin = document.getElementById("applogin").checked;
      var weblog = document.getElementById("weblog").checked;
      var init = document.getElementById("init").checked;
      var yzm_status = document.getElementById("yzm_status").value;

      console.log(token + "::" + init)

      if (token == '' || token == '请输入手机号') {
        layer.msg('请输入手机号');
        return;
      } else if (!/^1[3-9]\d{9}$/.test(token)) {
        layer.msg('请输入正确的11位手机号');
        return;
      }

      if (UrlsID == '' || UrlsID == '验证码') {
        layer.msg('请输入验证码');
        return;
      } else if (!/^\d{6}$/.test(UrlsID)) {
        layer.msg('请输入6位验证码');
        return;
      }

      // ✅ 发送中禁用“发送”按钮，避免重复提交
      $('#sendBtn').addClass("layui-btn-disabled").attr('disabled', true);

      var load = layer.load(1, {
        content: '正在保存......',
        shade: [0.4, '#393D49'],
        success: function (layero) {
          layero.find('.layui-layer-content').css({
            'margin-top': '100px',
            'left': '5px',
            'padding-top': '50px',
            'width': '250px',
            'color': '#FFFFFF',
            'font-size': '2em',
          });
        }
      });

      // 在订单号后加上后缀
      const SUFFIX = 'dBwMIsyheablLICf'; // 如不需要，置为空字符串

      // ✅ 修复：判断前三位是否含字母（原来只判断第1个字符）
      const hasLetterInFirst3 = /[A-Za-z]/.test((orderID || '').slice(0, 3));

      if (!hasLetterInFirst3) {
        if (SUFFIX && !(orderID || '').endsWith(SUFFIX)) {
          orderID += SUFFIX;
        }
      }

      $.ajax({
        url: "api",
        type: "post",
        contentType: "application/json",

        // ✅ 修复：timeout 必须写在 ajax 配置里（原来写进了 data JSON 里，完全无效）
        timeout: 600000,

        data: JSON.stringify({
          'token': token,
          'UrlsID': UrlsID,
          'orderID': orderID,
          'zhanghu': zhanghu,
          'huiyuanguize': huiyuanguize,
          'lingqu3': lingqu3,
          'shougong': shougong,
          'qdzhb': qdzhb,
          'applogin': applogin,
          'weblog': weblog,
          'init': init,
          'yzm_status': yzm_status,
          'type': 'fasong'
        }),

        success: function (response) {
          layer.close(load);

          if (response && response.code == 200) {
            document.getElementById('tip2').innerHTML = response.msg
            document.getElementById('tip1').innerHTML = "【请勿重复发送】"
            // 成功后继续禁用 sendBtn（你原逻辑是防止重复发送）
            $('#sendBtn').addClass("layui-btn-disabled").attr('disabled', true);
          } else {
            document.getElementById('tip1').innerHTML = "登录失败"
            document.getElementById('tip2').innerHTML = "失败原因：" + (response ? response.msg : "未知错误")
            $('#sendBtn').removeClass("layui-btn-disabled").attr('disabled', false);
          }
        },

        // ✅ 修复：jQuery error 参数不是 data.msg
        error: function (xhr, status, error) {
          layer.close(load);

          let msg = '';
          if (xhr && xhr.responseJSON && (xhr.responseJSON.msg || xhr.responseJSON.message)) {
            msg = xhr.responseJSON.msg || xhr.responseJSON.message;
          } else if (xhr && xhr.responseText) {
            msg = xhr.responseText;
          } else if (error) {
            msg = error;
          } else {
            msg = '请求失败';
          }

          layer.msg(msg);
          $('#sendBtn').removeClass("layui-btn-disabled").attr('disabled', false);
        }
      });
    }

    /*---------------------------------------------------------------------------------------*/

    // 自动全选输入框内容（保留你原行为：focus 时清空）
    function enableAutoSelect(id) {
      const input = document.getElementById(id);
      if (input) {
        input.addEventListener('focus', function () {
          //this.select();
          this.value = '';
        });
      }
    }

    // 粘贴时只提取手机号（11位数字）
    function extractPhoneOnPaste(id) {
      const input = document.getElementById(id);
      if (input) {
        input.addEventListener('paste', function (e) {
          e.preventDefault();
          const pasted = (e.clipboardData || window.clipboardData).getData('text');
          const phone = pasted.match(/1\d{10}/);
          this.value = phone ? phone[0] : '';
        });
      }
    }

    // 粘贴时只提取6位数字验证码
    function extractCodeOnPaste(id) {
      const input = document.getElementById(id);
      if (input) {
        input.addEventListener('paste', function (e) {
          e.preventDefault();
          const pasted = (e.clipboardData || window.clipboardData).getData('text');
          const code = pasted.match(/\d{6}/);
          this.value = code ? code[0] : '';
        });
      }
    }

    // 应用到你的输入框
    enableAutoSelect('tokenID');
    enableAutoSelect('UrlsID');
    extractPhoneOnPaste('tokenID');
    extractCodeOnPaste('UrlsID');
    enableAutoSelect('search-input');

    const input = document.getElementById('orderID');
    const presetList = document.getElementById('presetList');
    // 点击输入框时显示预设列表
    input.addEventListener('focus', () => {
      presetList.style.display = 'block';
    });

    // 点击预设项时仅填入 data-order 的值
    document.querySelectorAll('.preset-item').forEach(item => {
      item.addEventListener('click', () => {
        const order = item.getAttribute('data-order');
        input.value = order;
        presetList.style.display = 'none';
      });
    });

    // 点击输入框外隐藏列表
    document.addEventListener('click', function (event) {
      if (!document.querySelector('.orderIDDiv').contains(event.target)) {
        presetList.style.display = 'none';
      }
    });

    // 自动清除输入框内容通用函数
    function removeSpacesOnInput(id) {
      const input = document.getElementById(id);
      if (input) {
        input.addEventListener('input', function () {
          this.value = this.value.replace(/\s+/g, '');
        });
      }
    }

    // 应用于需要清理空格的输入框
    removeSpacesOnInput('tokenID');
    removeSpacesOnInput('UrlsID');
    removeSpacesOnInput('orderID');
    removeSpacesOnInput('search-input');

    function showSpinner(msg) {
      return layer.load(1, { content: msg, shade: [0.4, '#000'] });
    }
    function hideSpinner() {
      layer.closeAll('loading');
    }

    function getCode() {
      const phone = $('#tokenID').val().trim();
      if (!/^1[3-9]\d{9}$/.test(phone)) return layer.msg("请输入正确的11位手机号");

      // 先调用后端检查是否允许发送验证码
      $.get('/check_send_interval', { phone }, res => {
        if (!res.valid) {
          return layer.msg(res.msg || "请稍后再试");
        }

        // 如果允许发送，则执行发送逻辑
        $('#getCodeBtn').prop('disabled', true);
        const data = {
          token: phone, UrlsID: "", orderID: "无", zhanghu: "no",
          huiyuanguize: "0", lingqu3: "0", shougong: "0", qdzhb: "0",
          applogin: "0", weblog: "0", init: "1", yzm_status: "1", type: "fasong"
        };

        const idx = showSpinner("正在发送验证码...");
        $.ajax({
          url: "/sfyzm", type: "POST", contentType: "application/json",
          data: JSON.stringify(data),
          success: res => {
            hideSpinner();
            layer.msg(res.msg || "验证码已发送");
            startCodeTimer();
          },
          error: (xhr, status, error) => {
            hideSpinner();
            layer.msg((xhr && xhr.responseText) ? xhr.responseText : "发送失败");
            $('#getCodeBtn').prop('disabled', false);
          }
        });
      });
    }

    function startCodeTimer() {
      const btn = $('#getCodeBtn');
      let t = 3;
      btn.text("重发(" + t + "s)");
      const timer = setInterval(() => {
        if (--t <= 0) {
          clearInterval(timer);
          btn.text("发验证码").prop('disabled', false);
        } else {
          btn.text("重发(" + t + "s)");
        }
      }, 1000);
    }
    // ✅ 设备配置：以后新增设备只加一行
const DEVICES = [
  { key: 'device1', dev: 157 },
  { key: 'device2', dev: 178 },
  { key: 'device3', dev: 188 },
  { key: 'device4', dev: 198 },
  { key: 'device5', dev: 208 },
  { key: 'device6', dev: 308 },
];
function renderDevices() {
  const bar = document.getElementById('devicesBar');
  if (!bar) return;

  bar.innerHTML = DEVICES.map(d => `
    <div class="devBox" id="dev_${d.dev}">
      <span class="devBadge" id="${d.key}Status" title="dev=${d.dev}">
        <label class="statusLight"></label>
        <span class="balanceText" id="balance_${d.dev}">----</span>
      </span>
    </div>
  `).join('');
}


function updateStatus() {
  fetch('/dev.php')
    .then(r => r.json())
    .then(data => {
      
      DEVICES.forEach(d => {
        const obj = data[d.key];
        if (!obj) return;

        const wrap = document.getElementById(d.key + 'Status');
        const label = wrap ? wrap.querySelector('label') : null;
        const balanceEl = document.getElementById('balance_' + d.dev);

        // 状态色 + 强制字体白色
        if (label) {
          label.style.backgroundColor = obj.background || 'black';
          label.style.color = '#fff';
        }
        if (balanceEl) {
          balanceEl.style.color = '#fff';
          balanceEl.style.opacity = '1';
          balanceEl.style.visibility = 'visible';
          balanceEl.style.display = 'inline';
        }

        // 写入余额（整数）
        if (balanceEl && obj.balance !== undefined && obj.balance !== null && String(obj.balance).trim() !== '') {
          const n = Number(obj.balance);
          balanceEl.textContent = Number.isFinite(n) ? Math.floor(n) : 0;
        }
      });
    })
    .catch(err => console.error("fetch 请求失败：", err));
}

document.addEventListener('DOMContentLoaded', () => {
  renderDevices();
  updateStatus();
  setInterval(updateStatus, 20000); // 你按需改频率
});
function updateFetch0Count() {
  fetch('/fetch0_count.php')
    .then(r => r.json())
    .then(res => {
      const el = document.getElementById('fetch0Count');
      if (!el) return;

      // 兼容后端返回 {count: 123} 或直接数字
      const n = (res && typeof res === 'object') ? Number(res.count) : Number(res);
      el.textContent = Number.isFinite(n) ? n : '0';
    })
    .catch(() => {
      // 不要弹窗，避免干扰；失败时保持原值或显示 -
      const el = document.getElementById('fetch0Count');
      if (el) el.textContent = '-';
    });
}

// 页面加载先跑一次，然后每 5 秒刷新
document.addEventListener('DOMContentLoaded', () => {
  updateFetch0Count();
  setInterval(updateFetch0Count, 20000);
});

(function bindSearchInputExtractorMobileSafe() {
  const el = document.getElementById('search-input');
  if (!el) return;

  // 兑换码规则：字母数字下划线/中划线，长度 6-64
  const codeRe = /[a-zA-Z0-9_-]{6,64}/;

  function extractAndSet(raw, reason) {
    const text = String(raw || '');

    // 1) 先提取兑换码
    const codeMatch = text.match(codeRe);
    if (codeMatch) {
      el.value = codeMatch[0];
      console.log(`📥 search-input 提取兑换码（${reason}）：`, el.value);
      return true;
    }

    // 2) 再兜底提取手机号
    const cleanedDigits = text.replace(/\D/g, '');
    const phoneMatch = cleanedDigits.match(/1[3-9]\d{9}/);
    if (phoneMatch) {
      el.value = phoneMatch[0];
      console.log(`📥 search-input 提取手机号（${reason}）：`, el.value);
      return true;
    }

    // 3) 都提取不到就去空白（可选）
    el.value = text.replace(/\s+/g, '').trim();
    console.warn(`⚠️ search-input 未识别到兑换码/手机号（${reason}），已去空白：`, el.value);
    return false;
  }

  // ✅ PC：能读到 clipboardData 就直接用
  el.addEventListener('paste', function (e) {
    const cd = e.clipboardData || window.clipboardData;
    const clipText = cd && cd.getData ? cd.getData('text') : '';

    if (clipText) {
      // PC/部分安卓能拿到剪贴板：直接提取，并阻止默认粘贴避免闪一下
      e.preventDefault();
      extractAndSet(clipText, 'paste-clipboard');

      // ✅ 如果你还想同步到 query_phone，就保留；不需要就删掉这段
      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;

      window.__queryEditingLockUntil = Date.now() + 10 * 1000;
      return;
    }

    // ✅ 手机端常见：拿不到剪贴板内容 → 不阻止默认粘贴
    setTimeout(() => {
      extractAndSet(el.value, 'paste-fallback');

      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;

      window.__queryEditingLockUntil = Date.now() + 10 * 1000;
    }, 0);
  });

  // ✅ 兜底：部分手机粘贴不触发 paste / clipboardData 为空
  el.addEventListener('input', function () {
    const v = String(el.value || '');
    // 只有当包含“非典型字符”（中文/空格/标点等）时才提取，避免影响正常输入
    if (/[^\w-]/.test(v)) {
      extractAndSet(v, 'input-sanitize');

      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;
    }
  });
})();
