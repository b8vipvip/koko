<script>
(function () {
  if (window.__KOKO_SYSTEM_SETTINGS_OVERRIDE_V8__) return;
  window.__KOKO_SYSTEM_SETTINGS_OVERRIDE_V8__ = true;

  function toBool(v) {
    return String(v) === '1' || v === 1 || v === true || String(v).toLowerCase() === 'true';
  }

  function getSetting(json, key, defVal) {
    json = json || {};
    var data = json.data || json.settings || json;

    if (data && Object.prototype.hasOwnProperty.call(data, key)) {
      return data[key];
    }

    if (json && Object.prototype.hasOwnProperty.call(json, key)) {
      return json[key];
    }

    return defVal;
  }

  async function readJsonSafe(url, options) {
    var res = await fetch(url, options || { credentials: 'same-origin' });
    var text = await res.text();

    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error('接口返回非 JSON：' + text.slice(0, 120));
    }
  }

  async function loadSettings() {
    try {
      return await readJsonSafe('/phpapi/system_settings.php', { credentials: 'same-origin' });
    } catch (e) {
      console.warn('[KOKO_SYSTEM_SETTINGS_OVERRIDE_V8] load failed:', e);
      return {
        success: true,
        notify_backend_error: 1,
        notify_device_offline: 1,
        notify_new_recharge_task: 1
      };
    }
  }

  async function saveSettings(payload) {
    async function postJson() {
      return await readJsonSafe('/phpapi/system_settings.php', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }

    async function postForm() {
      var body = new URLSearchParams();
      Object.keys(payload).forEach(function (k) {
        body.append(k, payload[k]);
      });

      return await readJsonSafe('/phpapi/system_settings.php', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      });
    }

    try {
      var json = await postJson();
      if (json && (json.success || json.status === 'success')) return json;
      return json;
    } catch (e) {
      return await postForm();
    }
  }

  function rowHtml(id, title, desc, checked) {
    return ''
      + '<div class="koko-setting-row" style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0;">'
      + '  <div style="flex:1;min-width:0;">'
      + '    <div style="font-weight:600;color:#222;font-size:14px;">' + title + '</div>'
      + '    <div style="font-size:12px;color:#888;line-height:1.5;margin-top:4px;">' + desc + '</div>'
      + '  </div>'
      + '  <label style="display:flex;align-items:center;gap:6px;white-space:nowrap;font-size:13px;color:#333;">'
      + '    <input id="' + id + '" type="checkbox" ' + (checked ? 'checked' : '') + '>'
      + '    开启'
      + '  </label>'
      + '</div>';
  }

  function openSettingsModal(settings) {
    var backendError = toBool(getSetting(settings, 'notify_backend_error', 1));
    var deviceOffline = toBool(getSetting(settings, 'notify_device_offline', 1));
    var newRecharge = toBool(getSetting(settings, 'notify_new_recharge_task', 1));

    var html = ''
      + '<div id="koko-system-settings-v8" style="padding:14px 18px 4px;background:#fff;box-sizing:border-box;">'
      + rowHtml('kokoNotifyBackendError', '后端错误邮件通知', '后端接口、任务或系统异常时发送邮件提醒。', backendError)
      + rowHtml('kokoNotifyDeviceOffline', '设备离线邮件通知', '检测到设备掉线、异常不可用时发送邮件提醒。', deviceOffline)
      + rowHtml('kokoNotifyNewRechargeTask', '新充值任务邮件通知', '收到新的充值任务或待处理任务时发送邮件提醒。', newRecharge)
      + '<div style="font-size:12px;color:#999;line-height:1.6;margin-top:12px;">兑换链接已移动到 ka.k2n.cn/kami.html 页面中配置，这里不再显示兑换链接。</div>'
      + '</div>';

    if (!window.layer || !layer.open) {
      alert('系统配置弹窗组件未加载');
      return;
    }

    layer.open({
      type: 1,
      title: '系统配置',
      area: ['min(92vw, 620px)', 'auto'],
      content: html,
      btn: ['保存', '取消'],
      yes: async function (index) {
        var payload = {
          notify_backend_error: document.getElementById('kokoNotifyBackendError').checked ? 1 : 0,
          notify_device_offline: document.getElementById('kokoNotifyDeviceOffline').checked ? 1 : 0,
          notify_new_recharge_task: document.getElementById('kokoNotifyNewRechargeTask').checked ? 1 : 0
        };

        try {
          var json = await saveSettings(payload);

          if (json && json.success === false) {
            throw new Error(json.message || json.error || '保存失败');
          }

          layer.msg('系统配置保存成功');
          layer.close(index);
        } catch (e) {
          layer.alert('保存失败：' + e.message);
        }
      }
    });
  }

  async function handleSystemConfigClick(e) {
    var target = e.target;
    if (!target) return;

    var node = target.closest ? target.closest('button,a,input,span,div') : target;
    if (!node) return;

    var text = (node.innerText || node.value || node.textContent || '').trim();

    var isSystemButton =
      text === '系统配置' ||
      node.id === 'systemSettingsBtn' ||
      node.id === 'system_settings_btn' ||
      node.classList && (
        node.classList.contains('system-settings-btn') ||
        node.classList.contains('settings-btn')
      );

    if (!isSystemButton) return;

    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();

    try {
      var settings = await loadSettings();
      openSettingsModal(settings);
    } catch (err) {
      if (window.layer && layer.alert) {
        layer.alert('打开系统配置失败：' + err.message);
      } else {
        alert('打开系统配置失败：' + err.message);
      }
    }
  }

  // 用捕获阶段拦截，阻止旧系统配置 click 逻辑继续执行
  document.addEventListener('click', handleSystemConfigClick, true);

  console.log('[KOKO_SYSTEM_SETTINGS_OVERRIDE_V8] installed');
})();
</script>
<!-- KOKO_SYSTEM_SETTINGS_OVERRIDE_V8_END -->

(function bindSearchInputExtractorMobileSafe() {
  const el = document.getElementById('search-input');
  if (!el) return;

  // 兑换码规则：字母数字下划线/中划线，长度 6-64
  const codeRe = /[a-zA-Z0-9_-]{6,64}/;

  function extractAndSet(raw, reason) {
    const text = String(raw || '');

    // 1) 先提取兑换码
    const codeMatch = text.match(codeRe);
    if (codeMatch) {
      el.value = codeMatch[0];
      console.log(`📥 search-input 提取兑换码（${reason}）：`, el.value);
      return true;
    }

    // 2) 再兜底提取手机号
    const cleanedDigits = text.replace(/\D/g, '');
    const phoneMatch = cleanedDigits.match(/1[3-9]\d{9}/);
    if (phoneMatch) {
      el.value = phoneMatch[0];
      console.log(`📥 search-input 提取手机号（${reason}）：`, el.value);
      return true;
    }

    // 3) 都提取不到就去空白（可选）
    el.value = text.replace(/\s+/g, '').trim();
    console.warn(`⚠️ search-input 未识别到兑换码/手机号（${reason}），已去空白：`, el.value);
    return false;
  }

  // ✅ PC：能读到 clipboardData 就直接用
  el.addEventListener('paste', function (e) {
    const cd = e.clipboardData || window.clipboardData;
    const clipText = cd && cd.getData ? cd.getData('text') : '';

    if (clipText) {
      // PC/部分安卓能拿到剪贴板：直接提取，并阻止默认粘贴避免闪一下
      e.preventDefault();
      extractAndSet(clipText, 'paste-clipboard');

      // ✅ 如果你还想同步到 query_phone，就保留；不需要就删掉这段
      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;

      window.__queryEditingLockUntil = Date.now() + 10 * 1000;
      return;
    }

    // ✅ 手机端常见：拿不到剪贴板内容 → 不阻止默认粘贴
    setTimeout(() => {
      extractAndSet(el.value, 'paste-fallback');

      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;

      window.__queryEditingLockUntil = Date.now() + 10 * 1000;
    }, 0);
  });

  // ✅ 兜底：部分手机粘贴不触发 paste / clipboardData 为空
  el.addEventListener('input', function () {
    const v = String(el.value || '');
    // 只有当包含“非典型字符”（中文/空格/标点等）时才提取，避免影响正常输入
    if (/[^\w-]/.test(v)) {
      extractAndSet(v, 'input-sanitize');

      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;
    }
  });
})();

      window.currentDetailId,
      window.currentRecordId,
      window.currentTelDataId,
      window.selectedRecordId,
      window.selectedId
    ];

    for (var i = 0; i < candidates.length; i++) {
      var v = candidates[i];
      if (v !== undefined && v !== null && String(v).trim() !== '' && Number(v) > 0) {
        return String(v).trim();
      }
    }

    var domId =
      $('[data-current-id]').last().attr('data-current-id') ||
      $('input[name="id"]').last().val() ||
      $('input[name="tel_data_id"]').last().val() ||
      $('#id').val() ||
      $('#tel_data_id').val();

    if (domId && Number(domId) > 0) {
      return String(domId).trim();
    }

    return '';
  }

  $(document)
    .off('click.kokoManualFailure', '#sd-czsb-btn')
    .on('click.kokoManualFailure', '#sd-czsb-btn', function () {
      var id = getManualStatusId();

      if (!id) {
        layer.msg('未找到当前记录ID，无法标记失败', {icon: 2});
        return;
      }

      layer.confirm('确认将该订单标记为已失败？', {icon: 3, title: '确认操作'}, function (index) {
        layer.close(index);

        $.ajax({
          url: '/api.php?action=setManualFailure',
          type: 'POST',
          dataType: 'json',
          data: {id: id},
          success: function (res) {
            if (res && res.success) {
              layer.msg('已失败', {icon: 1});

              if (typeof showDetails === 'function') {
                showDetails(id);
              }

              if (typeof loadData === 'function') {
                loadData();
              }

              if (typeof fetchData === 'function') {
                fetchData();
              }
            } else {
              layer.msg((res && (res.message || res.error)) || '操作失败', {icon: 2});
            }
          },
          error: function (xhr) {
            layer.msg('操作失败：' + (xhr.responseText || xhr.status), {icon: 2});
          }
        });
      });
    });

  $(function () {
    setInterval(function () {
      var id = getManualStatusId();
      if (id) {
        setManualStatusId(id);
      }
    }, 500);
  });
})();
</script>

<script id="koko-details-back-js">
(function () {
  function showListAndHideDetails() {
    var dataTable = document.getElementById('data-table');
    var details = document.getElementById('details-container');

    if (details) {
      details.style.display = 'none';
    }

    if (dataTable) {
      dataTable.style.display = '';
    }

    var table = dataTable ? dataTable.closest('table') : document.querySelector('table.table');
    if (table) {
      table.style.display = '';
    }

    var pagination = document.querySelector('.pagination');
    if (pagination) {
      pagination.style.display = '';
    }

    return false;
  }

  window.kokoCloseDetailsContainer = showListAndHideDetails;
  window.returnFromDetails = showListAndHideDetails;

  function patchGoHome() {
    if (window.__kokoGoHomeNoSearchPatch) return;
    if (typeof window.goHome !== 'function') return;

    var oldGoHome = window.goHome;
    window.goHome = function () {
      showListAndHideDetails();
      return oldGoHome.apply(this, arguments);
    };

    window.__kokoGoHomeNoSearchPatch = true;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', patchGoHome);
  } else {
    patchGoHome();
  }

  var n = 0;
  var timer = setInterval(function () {
    patchGoHome();
    n++;
    if (n > 20 || window.__kokoGoHomeNoSearchPatch) {
      clearInterval(timer);
    }
  }, 300);
})();
</script>
