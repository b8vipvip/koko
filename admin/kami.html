<script>
(function () {
  if (window.__KOKO_KAMI_REDEEM_URL_EARLY_COMPAT_V5__) return;
  window.__KOKO_KAMI_REDEEM_URL_EARLY_COMPAT_V5__ = true;

  var DEFAULT_RETAIL_URL = 'https://cn12.vip';
  var DEFAULT_AGENT_URL = 'https://vip.ka8.shop';

  function findOwnershipSelect() {
    var ids = ['code_ownership', 'ownership', 'source_type', 'agent_code', 'agent_select', 'agentCode', 'extract_ownership'];
    for (var i = 0; i < ids.length; i++) {
      var el = document.getElementById(ids[i]);
      if (el && el.tagName && el.tagName.toLowerCase() === 'select') return el;
    }

    var selects = document.querySelectorAll('select');
    for (var j = 0; j < selects.length; j++) {
      var txt = selects[j].innerText || '';
      if (txt.indexOf('普通用户') !== -1 || txt.indexOf('代理') !== -1) return selects[j];
    }
    return null;
  }

  function isAgentSelected() {
    var el = findOwnershipSelect();
    if (!el) return false;

    var value = String(el.value || '').trim();
    var text = '';

    try {
      text = String(el.options[el.selectedIndex] ? el.options[el.selectedIndex].text : '').trim();
    } catch (e) {}

    if (!value) return false;
    if (value === 'retail' || value === '普通用户') return false;
    if (text === '普通用户') return false;

    return true;
  }

  function buildCompatJson(json) {
    json = json || {};

    var defaults = json.defaults || {};

    var retail = String(
      json.retail_exchange_url ||
      defaults.retail_exchange_url ||
      json.redeem_url ||
      DEFAULT_RETAIL_URL
    ).trim();

    var agent = String(
      json.agent_exchange_url ||
      defaults.agent_exchange_url ||
      DEFAULT_AGENT_URL
    ).trim();

    var current = isAgentSelected() ? agent : retail;

    json.success = json.success !== false;
    json.status = json.status || 'success';
    json.retail_exchange_url = retail;
    json.agent_exchange_url = agent;

    // 兼容旧代码
    json.redeem_url = current;

    json.data = Object.assign({}, json.data || {}, {
      redeem_url: current,
      retail_exchange_url: retail,
      agent_exchange_url: agent
    });

    json.settings = Object.assign({}, json.settings || {}, {
      redeem_url: current,
      retail_exchange_url: retail,
      agent_exchange_url: agent
    });

    window.KOKO_EXCHANGE_LINK_CONFIG = json;
    window.KOKO_CURRENT_EXCHANGE_URL = current;

    return json;
  }

  function responseFromJson(json) {
    return new Response(JSON.stringify(json), {
      status: 200,
      headers: {'Content-Type': 'application/json'}
    });
  }

  if (window.fetch && !window.fetch.__kokoRedeemCompatV5) {
    var rawFetch = window.fetch;

    window.fetch = function (input, init) {
      var url = typeof input === 'string' ? input : ((input && input.url) || '');
      var method = (init && init.method ? String(init.method) : 'GET').toUpperCase();

      // 旧代码请求 system_settings.php 或新代码请求 exchange_link_config 时，都返回兼容结构
      if (
        method === 'GET' &&
        (
          String(url).indexOf('/phpapi/system_settings.php') !== -1 ||
          String(url).indexOf('/exchange_link_config') !== -1
        )
      ) {
        return rawFetch('/exchange_link_config', {credentials: 'same-origin'})
          .then(function (res) { return res.text(); })
          .then(function (text) {
            var json = {};
            try {
              json = JSON.parse(text);
            } catch (e) {
              json = {};
            }
            return responseFromJson(buildCompatJson(json));
          });
      }

      return rawFetch.apply(this, arguments);
    };

    window.fetch.__kokoRedeemCompatV5 = true;
    console.log('[KOKO_REDEEM_COMPAT_V5] early fetch patched');
  }

  // 提供一个全局安全读取函数，后续脚本也可以使用
  window.kokoGetCurrentExchangeUrl = function () {
    var cfg = window.KOKO_EXCHANGE_LINK_CONFIG || {};
    return isAgentSelected()
      ? (cfg.agent_exchange_url || DEFAULT_AGENT_URL)
      : (cfg.retail_exchange_url || DEFAULT_RETAIL_URL);
  };
})();
</script>

<script>
layui.use(['layer'], function(){
  const layer = layui.layer;

  // 根据选择的规格更新价格选项
  document.getElementById('order_type').addEventListener('change', function () {
    const type = this.value;
    const priceSelect = document.getElementById('order_price');
    priceSelect.innerHTML = '';

    const priceMap = {
      'ct1': [9.9, 14.9],
      'hh1': [3.8,5.8, 9.8, 10.8],
      'hh3': [21.8, 23.8, 27.8],
      'hh12': [92.8, 115],
      'cj1': [9.9,11.8, 12.9, 14.9, 18.8],
      'cj3': [32.8, 52.8],
      'cj12': [128, 168]
    };

    const priceOptions = priceMap[type] || [];
    priceOptions.forEach(price => {
      const option = document.createElement('option');
      option.value = price;
      option.textContent = price;
      priceSelect.appendChild(option);
    });
  });

  // 初始化价格选项
  document.getElementById('order_type').dispatchEvent(new Event('change'));

  // 页面打开后加载已启用代理；加载失败时保留“普通用户”选项。
  async function loadActiveAgents() {
    const sourceSelect = document.getElementById('extractSourceType');
    try {
      const response = await fetch('/admin/agent/list', { credentials: 'same-origin' });
      const result = await response.json();
      if (!response.ok || result.status !== 'success' || !Array.isArray(result.agents)) {
        throw new Error(result.message || '代理列表加载失败');
      }

      result.agents.forEach(agent => {
        const agentCode = String(agent.agent_code || '').trim();
        if (!agentCode) return;

        const option = document.createElement('option');
        option.value = 'agent';
        option.dataset.agentCode = agentCode;
        option.textContent = `代理 ${agent.agent_name || agentCode}`;
        sourceSelect.appendChild(option);
      });
    } catch (error) {
      console.error('代理列表加载失败', error);
      layer.msg('代理列表加载失败，仍可提取普通用户码', {icon: 2, time: 3000});
    }
  }

  loadActiveAgents();

  let isSubmitting = false;

  // 下载文本文件
  function downloadTxtFile(content, filename) {
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

// 处理返回的卡密并弹出可复制提示
async function showCopyDialog(orderIDs) {
  const settingsResponse = await fetch('/phpapi/system_settings.php', { credentials: 'same-origin' });
  const settingsResult = await settingsResponse.json();
  if (!settingsResponse.ok || !settingsResult.success || !settingsResult.settings.redeem_url) {
    throw new Error(settingsResult.message || '无法加载兑换链接配置');
  }
  const redeemUrl = settingsResult.settings.redeem_url;
  const lines = orderIDs.map(id => `第一步：手机浏览器打开兑换链接：${redeemUrl}\n第二步：提交兑换，兑换码：${id} `);
  const fullText = `会员兑换流程：\n\n${lines.join('\n')}`;

  const contentHTML = `
    <div style="padding:16px;font-family:sans-serif;">
      <div style="margin-bottom:10px;font-weight:bold;font-size:16px;color:#333;">
        复制以下兑换信息
      </div>
      <textarea id="copyTextArea" readonly style="
        width:100%;
        height:180px;
        border:1px solid #ddd;
        border-radius:6px;
        padding:10px;
        font-size:14px;
        line-height:1.5;
        background-color:#f9f9f9;
        color:#333;
        resize:none;
      ">${fullText}</textarea>
      <button id="copyButton" class="layui-btn layui-btn-normal" style="
        margin-top:16px;
        width:100%;
        height:40px;
        font-size:16px;
        border-radius:6px;
      ">📋 点击复制内容</button>
    </div>
  `;

  const index = layer.open({
    type: 1,
    title: '提取结果',
    area: ['90%', '400px'],
    shadeClose: true,
    content: contentHTML
  });

  setTimeout(() => {
    document.getElementById('copyTextArea').select();
  }, 100);

  // 兼容复制
  $(document).off('click', '#copyButton').on('click', '#copyButton', function() {
    const textArea = document.getElementById('copyTextArea');
    const text = textArea.value;

    // 尝试现代 Clipboard API
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        layer.msg('已复制到剪贴板 ✅', {icon: 1, time: 2000});
        layer.close(index);
      }).catch(() => {
        fallbackCopy(textArea);
      });
    } else {
      fallbackCopy(textArea);
    }

    function fallbackCopy(element) {
      try {
        element.removeAttribute('readonly');
        element.select();
        element.setSelectionRange(0, 99999);
        const successful = document.execCommand('copy');
        element.setAttribute('readonly', true);
        if (successful) {
          layer.msg('已复制到剪贴板 ✅', {icon: 1, time: 2000});
          layer.close(index);
        } else {
          layer.msg('复制失败，请长按文本手动复制 ❌');
        }
      } catch (err) {
        console.error('复制异常', err);
        layer.msg('复制失败，请长按文本手动复制 ❌');
      }
    }
  });
}
  // 提取卡密
  document.getElementById('extract_btn').addEventListener('click', function () {
    if (isSubmitting) {
      layer.msg('请求处理中，请稍候...');
      return;
    }

    
    const type = document.getElementById('order_type').value;
    const price = parseFloat(document.getElementById('order_price').value);
    const count = 1;
    const warehouse = 'admin';
    const sourceSelect = document.getElementById('extractSourceType');
    const selectedSource = sourceSelect.options[sourceSelect.selectedIndex];
    const sourceType = selectedSource.value;
    const agentCode = selectedSource.dataset.agentCode || '';

    if (!count || !type || !price) {
      layer.alert("请填写完整信息！");
      return;
    }

    isSubmitting = true;
    document.getElementById('extract_btn').disabled = true;

    const loadingIndex = layer.open({
      type: 1,
      shade: 0.3,
      shadeClose: false,
      title: false,
      closeBtn: 0,
      area: ['260px', '120px'],
      offset: 'auto',
      content: `
        <div style="text-align:center;padding:20px;">
          <div class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop" 
              style="font-size:30px;color:#1890ff;"></div>
          <div style="margin-top:10px;font-size:14px;color:#333;">请勿关闭，正在提取...</div>
        </div>
      `
    });

    fetch("/extract_order", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        order_count: count,
        order_type: type,
        order_price: price,
        warehouse: warehouse,
        source_type: sourceType,
        agent_code: agentCode
      })
    })
    .then(res => res.json())
.then(data => {
  layer.close(loadingIndex);
  if (data.success) {
    if (data.order_ids && data.order_ids.length > 0) {
      showCopyDialog(data.order_ids).catch(error => layer.msg(error.message || '无法加载兑换链接配置', {icon: 2}));
    } else {
      layer.alert("没有可用的兑换码，请稍后再试或检查库存。");
    }
  } else {
    layer.alert("提取失败：" + data.error);
  }
})
    .catch(err => {
      console.error(err);
      layer.close(loadingIndex);
      layer.alert("请求出错：" + err.message);
    })
    .finally(() => {
      isSubmitting = false;
      document.getElementById('extract_btn').disabled = false;
    });
  });
});
</script>

<script>
(function () {
  if (window.__KOKO_KAMI_EXCHANGE_LINK_FINAL_V4__) return;
  window.__KOKO_KAMI_EXCHANGE_LINK_FINAL_V4__ = true;

  var DEFAULT_RETAIL_URL = 'https://cn12.vip';
  var DEFAULT_AGENT_URL = 'https://vip.ka8.shop';

  var config = {
    retail_exchange_url: DEFAULT_RETAIL_URL,
    agent_exchange_url: DEFAULT_AGENT_URL
  };

  function cleanUrl(v, fallback) {
    v = String(v || '').trim();
    return v || fallback;
  }

  function trimSlash(v) {
    return String(v || '').trim().replace(/\/+$/, '');
  }

  function validUrl(v) {
    return /^https?:\/\/[A-Za-z0-9.-]+(?::\d+)?(?:\/.*)?$/.test(String(v || '').trim());
  }

  function msg(text, color) {
    var el = document.getElementById('koko_exchange_link_save_msg');
    if (el) {
      el.textContent = text || '';
      el.style.color = color || '#666';
    }
  }

  function findOwnershipSelect() {
    var ids = [
      'code_ownership',
      'ownership',
      'source_type',
      'agent_code',
      'agent_select',
      'agentCode',
      'extract_ownership'
    ];

    for (var i = 0; i < ids.length; i++) {
      var el = document.getElementById(ids[i]);
      if (el && el.tagName && el.tagName.toLowerCase() === 'select') return el;
    }

    var selects = document.querySelectorAll('select');
    for (var j = 0; j < selects.length; j++) {
      var txt = selects[j].innerText || '';
      if (txt.indexOf('普通用户') !== -1 || txt.indexOf('代理') !== -1) return selects[j];
    }

    return null;
  }

  function isAgentSelected() {
    var el = findOwnershipSelect();
    if (!el) return false;

    var value = String(el.value || '').trim();
    var text = '';
    try {
      text = String(el.options[el.selectedIndex] ? el.options[el.selectedIndex].text : '').trim();
    } catch (e) {}

    if (!value) return false;
    if (value === 'retail' || value === '普通用户') return false;
    if (text === '普通用户') return false;

    return true;
  }

  function currentKey() {
    return isAgentSelected() ? 'agent_exchange_url' : 'retail_exchange_url';
  }

  function currentDefaultUrl() {
    return isAgentSelected() ? DEFAULT_AGENT_URL : DEFAULT_RETAIL_URL;
  }

  function currentUrl() {
    return trimSlash(cleanUrl(config[currentKey()], currentDefaultUrl()));
  }

  function findExchangeInput() {
    var el = document.getElementById('koko_exchange_link_auto');
    if (el) return el;

    var ids = ['exchange_link', 'exchange_url', 'redeem_link', 'redeem_url', 'link_url', 'copy_link'];
    for (var i = 0; i < ids.length; i++) {
      var x = document.getElementById(ids[i]);
      if (x && ('value' in x)) return x;
    }

    return null;
  }

  function ensureExchangeInput() {
    var input = findExchangeInput();

    if (!input) {
      var own = findOwnershipSelect();
      var wrap = document.createElement('div');
      wrap.id = 'koko_exchange_link_auto_wrap';
      wrap.innerHTML = ''
        + '<label style="display:block;margin-bottom:6px;font-weight:600;">兑换链接</label>'
        + '<div id="koko_exchange_link_edit_row">'
        + '<input id="koko_exchange_link_auto">'
        + '<button id="koko_exchange_link_save_btn" type="button">保存</button>'
        + '</div>'
        + '<span id="koko_exchange_link_save_msg"></span>';

      if (own && own.parentNode) {
        own.parentNode.insertAdjacentElement('afterend', wrap);
      } else {
        document.body.insertBefore(wrap, document.body.firstChild);
      }

      return document.getElementById('koko_exchange_link_auto');
    }

    input.id = 'koko_exchange_link_auto';
    input.removeAttribute('readonly');
    input.readOnly = false;

    if (!document.getElementById('koko_exchange_link_save_btn')) {
      var row = document.createElement('div');
      row.id = 'koko_exchange_link_edit_row';

      input.parentNode.insertBefore(row, input);
      row.appendChild(input);

      var btn = document.createElement('button');
      btn.id = 'koko_exchange_link_save_btn';
      btn.type = 'button';
      btn.textContent = '保存';
      row.appendChild(btn);

      var msgEl = document.createElement('span');
      msgEl.id = 'koko_exchange_link_save_msg';
      row.insertAdjacentElement('afterend', msgEl);
    }

    return input;
  }

  function applyInputValue(force) {
    var input = ensureExchangeInput();
    if (!input) return;

    var key = currentKey();
    var url = currentUrl();

    window.KOKO_CURRENT_EXCHANGE_URL = url;

    if (force || input.getAttribute('data-koko-current-key') !== key) {
      input.value = url;
      input.setAttribute('data-koko-current-key', key);
    }

    msg(key === 'agent_exchange_url' ? '当前保存代理兑换链接' : '当前保存普通用户兑换链接', '#666');
    replaceOldRedeemLinks();
    console.log('[KOKO_KAMI_EXCHANGE_FINAL_V4] key=' + key + ', url=' + url);
  }

  function loadConfig() {
    fetch('/exchange_link_config', {credentials: 'same-origin'})
      .then(function (res) { return res.text(); })
      .then(function (text) {
        var json = {};
        try {
          json = JSON.parse(text);
        } catch (e) {
          throw new Error('读取配置接口返回非 JSON：' + text.slice(0, 120));
        }

        config.retail_exchange_url = cleanUrl(json.retail_exchange_url, DEFAULT_RETAIL_URL);
        config.agent_exchange_url = cleanUrl(json.agent_exchange_url, DEFAULT_AGENT_URL);
        applyInputValue(true);
      })
      .catch(function (err) {
        console.warn('[KOKO_KAMI_EXCHANGE_FINAL_V4] load config failed', err);
        applyInputValue(true);
      });
  }

  function saveCurrent() {
    var input = ensureExchangeInput();
    var value = trimSlash(input && input.value || '');

    if (!validUrl(value)) {
      msg('保存失败：兑换链接必须以 http:// 或 https:// 开头', '#ff4d4f');
      return;
    }

    var key = currentKey();
    var payload = {};
    payload[key] = value;

    msg('保存中...', '#666');

    fetch('/admin/exchange_link_config', {
      method: 'POST',
      credentials: 'same-origin',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    })
    .then(function (res) {
      return res.text().then(function (text) {
        var json = {};
        try {
          json = JSON.parse(text);
        } catch (e) {
          throw new Error('接口返回非 JSON：' + text.slice(0, 120));
        }

        if (!res.ok || !(json.success || json.status === 'success')) {
          throw new Error(json.message || json.error || ('HTTP ' + res.status));
        }

        return json;
      });
    })
    .then(function (json) {
      config.retail_exchange_url = cleanUrl(json.retail_exchange_url, config.retail_exchange_url);
      config.agent_exchange_url = cleanUrl(json.agent_exchange_url, config.agent_exchange_url);

      applyInputValue(true);
      msg('保存成功', '#52c41a');

      if (window.layer && layer.msg) layer.msg('兑换链接保存成功');
    })
    .catch(function (err) {
      msg('保存失败：' + err.message, '#ff4d4f');
      if (window.layer && layer.alert) layer.alert('保存失败：' + err.message);
    });
  }

  function replaceBase(str) {
    var url = currentUrl();

    return String(str || '')
      .replace(/https?:\/\/ka\.k2n\.cn\/usrvip\/?/gi, url)
      .replace(/https?:\/\/ka\.k2n\.cn\/?usrvip\/?/gi, url);
  }

  function replaceOldRedeemLinks() {
    var input = document.getElementById('koko_exchange_link_auto');

    document.querySelectorAll('a[href]').forEach(function (a) {
      var oldHref = a.getAttribute('href') || '';
      var newHref = replaceBase(oldHref);
      if (newHref !== oldHref) a.setAttribute('href', newHref);

      var oldText = a.textContent || '';
      var newText = replaceBase(oldText);
      if (newText !== oldText) a.textContent = newText;
    });

    document.querySelectorAll('input, textarea').forEach(function (el) {
      if (el === input) return;
      var oldVal = el.value || '';
      var newVal = replaceBase(oldVal);
      if (newVal !== oldVal) el.value = newVal;
    });

    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
    var nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);

    nodes.forEach(function (node) {
      var oldText = node.nodeValue || '';
      if (oldText.indexOf('ka.k2n.cn/usrvip') === -1) return;
      node.nodeValue = replaceBase(oldText);
    });
  }

  function patchFetchForOldSystemSettings() {
    if (!window.fetch || window.fetch.__kokoExchangeFinalV4Patched) return;

    var rawFetch = window.fetch;

    window.fetch = function (input, init) {
      var url = typeof input === 'string' ? input : (input && input.url) || '';

      if (String(url).indexOf('/phpapi/system_settings.php') !== -1 && (!init || !init.method || String(init.method).toUpperCase() === 'GET')) {
        return rawFetch('/exchange_link_config', {credentials: 'same-origin'})
          .then(function (res) { return res.text(); })
          .then(function (text) {
            var json = {};
            try {
              json = JSON.parse(text);
            } catch (e) {
              json = {};
            }

            config.retail_exchange_url = cleanUrl(json.retail_exchange_url, DEFAULT_RETAIL_URL);
            config.agent_exchange_url = cleanUrl(json.agent_exchange_url, DEFAULT_AGENT_URL);

            var merged = Object.assign({}, json, {
              redeem_url: currentUrl(),
              retail_exchange_url: config.retail_exchange_url,
              agent_exchange_url: config.agent_exchange_url
            });

            return new Response(JSON.stringify(merged), {
              status: 200,
              headers: {'Content-Type': 'application/json'}
            });
          });
      }

      return rawFetch.apply(this, arguments).then(function (res) {
        try {
          if (String(url).indexOf('/extract_order') !== -1) {
            setTimeout(replaceOldRedeemLinks, 100);
            setTimeout(replaceOldRedeemLinks, 500);
            setTimeout(replaceOldRedeemLinks, 1200);
          }
        } catch (e) {}
        return res;
      });
    };

    window.fetch.__kokoExchangeFinalV4Patched = true;
  }

  function bindEvents() {
    var own = findOwnershipSelect();
    if (own && !own.__kokoExchangeFinalV4Bound) {
      own.addEventListener('change', function () {
        applyInputValue(true);
      });
      own.__kokoExchangeFinalV4Bound = true;
    }

    var btn = document.getElementById('koko_exchange_link_save_btn');
    if (btn && !btn.__kokoExchangeFinalV4Bound) {
      btn.addEventListener('click', saveCurrent);
      btn.__kokoExchangeFinalV4Bound = true;
    }
  }

  function boot() {
    patchFetchForOldSystemSettings();
    ensureExchangeInput();
    bindEvents();
    replaceOldRedeemLinks();
  }

  boot();
  loadConfig();

  var observer = new MutationObserver(function () {
    boot();
  });

  observer.observe(document.documentElement || document.body, {childList: true, subtree: true});

  setInterval(replaceOldRedeemLinks, 1500);

  setTimeout(boot, 300);
  setTimeout(boot, 1000);
})();
</script>
