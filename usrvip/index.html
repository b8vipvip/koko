  <script>
const API_BASE = "";

function api(path) {
  return path;
}

    function showSpinner(msg) {
      return layer.load(1, { content: msg, shade: [0.4, '#000'] });
    }
    function hideSpinner() {
      layer.closeAll('loading');
    }


function checkOrderValidityBeforeSend(orderID) {
  return $.ajax({
    url: api('/check_order_validity'),
    type: 'POST',
    contentType: 'application/json',
    dataType: 'json',
    data: JSON.stringify({ order_id: orderID }),
    timeout: 8000
  }).then(function(res) {
    // 兼容多种可能的后端返回格式
    if (
      res === true ||
      res === "true" ||
      res === "1" ||
      res.valid === true ||
      res.ok === true ||
      res.code === 0 ||
      res.status === "success" ||
      res.status === "valid"
    ) {
      return true;
    }

    const msg = res.msg || res.message || "兑换码无效，请检查后重新粘贴";
    layer.msg(msg);
    return false;
  }).catch(function() {
    layer.msg("兑换码校验失败，请稍后重试");
    return false;
  })
  .catch(err => {
    layer.closeAll();
    console.error('[submitUserInfo] error', err);
    layer.alert(err.message || "提交失败，请重试", { icon: 2 });
  });
}


// 全局锁（初始值必须是false）
let isSendingCode = false;

async function getCode() {
  // 1. 立即拦截重复点击
  if (isSendingCode) return;

  const phone = $('#phone').val().trim();

  // 先读取、清洗兑换码
  let rawOrderID = $('#order_id').val().trim();
  let match = rawOrderID.match(/\b[A-Za-z0-9]{8,30}\b/);
  let orderID = match ? match[0] : '';
  $('#order_id').val(orderID);

  if (!orderID) {
    layer.msg("请先粘贴兑换码");
    $('#order_id').focus();
    return;
  }

  if (!/^[A-Za-z0-9]{8,30}$/.test(orderID)) {
    layer.msg("兑换码格式不正确");
    $('#order_id').focus();
    return;
  }

  if (!/^1[3-9]\d{9}$/.test(phone)) {
    layer.msg("请输入正确的11位手机号");
    return;
  }

  // 2. 先锁住按钮，避免重复点击
  const btn = $('#getCodeBtn');
  btn.prop('disabled', true);
  isSendingCode = true;

  // 3. 先校验兑换码是否有效
  showSpinner("正在校验兑换码...");
  const orderValid = await checkOrderValidityBeforeSend(orderID);
  hideSpinner();

  if (!orderValid) {
    btn.prop('disabled', false);
    isSendingCode = false;
    return;
  }

  // 4. 检查验证码发送间隔
  $.ajax({
    url: api('/check_send_interval'),
    type: 'GET',
    data: { phone },
    timeout: 5000,
    success: function(res) {
      if (!res.valid) {
        layer.msg(res.msg || "请稍后再试");
        btn.prop('disabled', false);
        isSendingCode = false;
        return;
      }

      const data = {
        token: phone,
        UrlsID: "",
        orderID: orderID,
        zhanghu: "no",
        huiyuanguize: "0",
        lingqu3: "0",
        shougong: "0",
        qdzhb: "0",
        applogin: "0",
        weblog: "0",
        init: "1",
        yzm_status: "1",
        type: "fasong"
      };

      showSpinner("正在发送验证码...");
      $.ajax({
        url: api("/sfyzm"),
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(data),
        timeout: 10000,
        success: function(res) {
          hideSpinner();
          layer.msg(res.msg || "验证码已发送");
          startCodeTimer();
        },
        error: function() {
          hideSpinner();
          layer.msg("发送失败");
          btn.prop('disabled', false);
          isSendingCode = false;
        }
      });
    },
    error: function() {
      layer.msg("检查发送状态失败，请重试");
      btn.prop('disabled', false);
      isSendingCode = false;
    }
  });
}

function startCodeTimer() {
  const btn = $('#getCodeBtn');
  let t = 30;
  btn.text("已发送(" + t + "s)").prop('disabled', true); // 确保禁用（倒计时期间按钮不可点）
  const timer = setInterval(() => {
    if (--t <= 0) {
      clearInterval(timer);
      // 倒计时结束：恢复按钮 + 释放锁（核心修复点）
      btn.text("获取验证码").prop('disabled', false);
      isSendingCode = false; // 仅在这里释放锁！
    } else {
      btn.text("已发送(" + t + "s)");
    }
  }, 1000);
}

// 提交用户信息的防重锁
let inFlightSubmit = false;
// 确认充值的防重锁
let inFlightRecharge = false;

function genIdemKey() {
  return (Date.now().toString(36) + Math.random().toString(36).slice(2));
}

function submitUserInfo() {
  // 1. 前端立即拦截重复点击
  if (inFlightSubmit) return;
  inFlightSubmit = true;

  // 2. 按钮立即禁用（覆盖所有提交按钮）
  const submitBtns = $('.btn1,#submitBtn');
  submitBtns.prop('disabled', true).css('cursor', 'not-allowed'); // 增加样式提示

  // —— 原有数据清洗逻辑（不变） —— //
  let rawPhone = $('#phone').val().trim();
  let rawCode = $('#code').val().trim();
  let rawOrderID = $('#order_id').val().trim();

  const phone = rawPhone.replace(/[^\d]/g, '').slice(0, 11);
  const code = rawCode.replace(/[^\d]/g, '').slice(0, 6);
  let match = rawOrderID.match(/\b[A-Za-z0-9]{8,30}\b/);
  let orderID = match ? match[0] : '';

  $('#phone').val(phone);
  $('#code').val(code);
  $('#order_id').val(orderID);

  if (!/^1[3-9]\d{9}$/.test(phone)) {
    layer.msg("手机号不正确");
    // 校验失败：释放锁 + 恢复按钮
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
    return;
  }
  if (!/^\d{6}$/.test(code)) {
    layer.msg("请输入6位数字验证码");
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
    return;
  }
  if (!orderID) {
    layer.msg("请粘贴包含有效的兑换码");
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
    return;
  }
  if (!/^[A-Za-z0-9]{8,30}$/.test(orderID)) {
    layer.msg("兑换码错误（不能包含中文或符号）");
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
    return;
  }

  // —— loading弹层（不变） —— //
  const loadingIndex = layer.open({
    type: 1, shade: 0.3, shadeClose: false, title: false, closeBtn: 0,
    area: ['280px', '180px'], offset: 'auto',
    content:`
      <div style="text-align:center;padding:20px;">
        <div class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop" 
            style="font-size:30px;color:#1890ff;"></div>
        <div style="margin-top:10px;font-size:16px;color:#333;">请勿关闭，30秒后确认一下您账号！</div>
        
        <div style="margin-top:10px;font-size:13px;color:#ff0000;">如果没跳转？刷新页面查询进度看看</div>
      </div>`
  });

  // 幂等键（不变）
  const idem = genIdemKey();

  // —— 提交请求（补全finally兜底） —— //
  fetch(api('/submit'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Idempotency-Key': idem },
    body: JSON.stringify({ phone, code, order_id: orderID })
  })
  .then(async r => {
    const res = await r.json().catch(() => ({}));
    if (!r.ok) {
      console.error('[submitUserInfo] submit failed', r.status, res);
      throw new Error(res.message || res.msg || ('提交失败，HTTP ' + r.status));
    }
    return res;
  })
  .then(res => {
    layer.close(loadingIndex);

    window.currentRecordID = res.record_id;
    window.currentPhone = phone;
    window.currentCode = code;
    window.currentOrderID = orderID;

    if (res.status === 'error') {
      layer.alert("提交失败: " + (res.message || '未知错误'));
    } else if (res.status === 'single') {
      showAccountPopup([{ nickname: res.nickname, userid: res.userid, pic: res.pic }]);
    } else if (res.status === 'multiple') {
      showAccountPopup(res.accounts || []);
    } else if (res.status === 'new_user') {
      layer.alert("账号未注册，请先将账号登录到您设备上后，重新提交充值");
    } else if (res.status === 'code_error') {
      layer.alert("验证码错误或已失效,请重新操作！");
    } else {
      layer.alert("服务器繁忙，请重试");
    }
  })
  .catch(() => {
    layer.close(loadingIndex);
    layer.alert("没跳转？点查询进度看看");
  })
  .finally(() => {
    // 无论成功/失败，最终释放锁 + 恢复按钮
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
  });
}



function showAccountPopup(accounts) {
  // ✅ 使用 window 缓存的手机号、验证码、订单号
  // ✅ 如果变量不存在，尝试从输入框中兜底赋值一次
  window.currentPhone = window.currentPhone || $('#phone').val().trim();
  window.currentCode = window.currentCode || $('#code').val().trim();
  window.currentOrderID = window.currentOrderID || $('#order_id').val().trim();

  // ✅ 头像默认占位（无需外链，避免再引入 mixed content）
  const defaultAvatar =
    "data:image/svg+xml;utf8," +
    encodeURIComponent(
      "<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50'>" +
      "<rect width='100%' height='100%' rx='6' ry='6' fill='#eee'/>" +
      "<text x='50%' y='55%' text-anchor='middle' font-size='18' fill='#999' font-family='Arial'>?</text>" +
      "</svg>"
    );

  let html = '<div style="padding:10px">';

  (accounts || []).forEach((acc, i) => {
    // ✅ 如果不是 https，强制替换成 https
    let pic = (acc && acc.pic) ? String(acc.pic) : "";
    if (/^http:\/\//i.test(pic)) pic = pic.replace(/^http:\/\//i, "https://");
    if (!pic) pic = defaultAvatar;

    html += `
      <div style="display:flex;align-items:center;margin-bottom:10px;">
        <img
          src="${pic}"

}


function submitRecharge() {
  // 1. 前端立即拦截重复点击
  if (inFlightRecharge) return;
  inFlightRecharge = true;

  // 2. 禁用确认按钮（先找到弹窗内的确认按钮）
  const rechargeBtn = $('button:contains("确认兑换")');
  rechargeBtn.prop('disabled', true).css({ 
    'cursor': 'not-allowed', 
    'background': '#ccc' // 视觉上提示禁用
  });

  // —— 原有数据获取逻辑（不变） —— //
  const zhanghu = $('input[name="account"]:checked').val();
  const phone = window.currentPhone || $('#phone').val().trim();
  const code = window.currentCode || $('#code').val().trim();
  const orderID = window.currentOrderID || $('#order_id').val().trim();

  // —— 后端重复检查 + 业务逻辑（补全异常释放锁） —— //
  $.ajax({
    url: api('/check_recharge_duplicate'),
    type: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ phone, code, order_id: orderID, source: 'tel' }),
    success: res => {
      if (res.duplicate) {
        layer.alert("2分钟内已经提交过了，请勿重复提交", { icon: 0 });
        // 检查重复：释放锁 + 恢复按钮
        inFlightRecharge = false;
        rechargeBtn.prop('disabled', false).css({ 
          'cursor': 'pointer', 
          'background': '#1890ff' 
        });
        return;
      }

      // —— 原有北京时间判断逻辑（不变） —— //
      const now = new Date();
      const beijing = new Date(now.getTime() + 8 * 60 * 60 * 1000);
      const day = beijing.getUTCDay();
      const hour = beijing.getUTCHours();
      const minute = beijing.getUTCMinutes();

      let lingqu3 = "1";
      let qdzhb = "0";

      if (day >= 0 && day <= 6) {
        if (hour >= 7 && hour < 24) {
          lingqu3 = "1";
        }
      }

      if (hour >= 8 && hour < 13) {
        qdzhb = "1";
      }

      console.log("📅 北京时间:", beijing.toISOString(), "星期:", day, "lingqu3:", lingqu3);

      // —— 组装数据提交（不变） —— //
      const data = {
        token: phone,
        UrlsID: code,
        orderID,
        zhanghu,
        huiyuanguize: "0",
        qdzhb: qdzhb,
        shougong: "0",
        lingqu3: lingqu3,
        applogin: "1",
        weblog: "1",
        init: "0",
        yzm_status: "3",
        type: "chongzhi",
        record_id: window.currentRecordID
      };

      layer.closeAll();
      const idx = showSpinner("正在充值，请稍候...");
      $.ajax({
        url: api("/api"), type: "POST", contentType: "application/json",
        data: JSON.stringify(data),
        success: res => {
          hideSpinner();
          layer.alert(
            '正在充值，等<span style="color:red;font-weight:bold;font-size:18px;">6分钟</span>左右到账。',
            { icon: 1 }
          );
        },

        error: () => {
          hideSpinner();
          layer.alert("提交失败，请重试", { icon: 2 });
        },
        complete: () => {
          // 充值请求完成（成功/失败）：释放锁 + 恢复按钮
          inFlightRecharge = false;
          rechargeBtn.prop('disabled', false).css({ 
            'cursor': 'pointer', 
            'background': '#1890ff' 
          });
        }
      });
    },
    error: () => {
      layer.msg("网络异常，请稍后重试");
      // 检查请求失败：释放锁 + 恢复按钮
      inFlightRecharge = false;
      rechargeBtn.prop('disabled', false).css({ 
        'cursor': 'pointer', 
        'background': '#1890ff' 
      });
    }
  });
}

(function bindOrderIdExtractorMobileSafe() {
  const el = document.getElementById('order_id');
  if (!el) return;

  // 兑换码规则：字母数字下划线/中划线，长度 6-64（按你之前校验一致）
  const codeRe = /[a-zA-Z0-9_-]{6,64}/;

  function extractAndSet(raw, reason) {
    const text = String(raw || '');

    // 1) 先提取兑换码（因为这里是兑换码输入框，优先兑换码更符合预期）
    const codeMatch = text.match(codeRe);
    if (codeMatch) {
      el.value = codeMatch[0];
      console.log(`📥 order_id 提取兑换码（${reason}）：`, el.value);
      return true;
    }

    // 2) 再兜底提取手机号（如果用户把手机号也粘到兑换码框里）
    const cleanedDigits = text.replace(/\D/g, '');
    const phoneMatch = cleanedDigits.match(/1[3-9]\d{9}/);
    if (phoneMatch) {
      el.value = phoneMatch[0];
      console.log(`📥 order_id 提取手机号（${reason}）：`, el.value);
      return true;
    }

    // 3) 都提取不到就去空白（可选）
    el.value = text.replace(/\s+/g, '').trim();
    console.warn(`⚠️ order_id 未识别到兑换码/手机号（${reason}），已去空白：`, el.value);
    return false;
  }

  // ✅ PC：能读到 clipboardData 就直接用
  el.addEventListener('paste', function (e) {
    const cd = e.clipboardData || window.clipboardData;
    const clipText = cd && cd.getData ? cd.getData('text') : '';

    if (clipText) {
      // PC/部分安卓能拿到剪贴板：直接提取，并阻止默认粘贴避免闪一下
      e.preventDefault();
      extractAndSet(clipText, 'paste-clipboard');

      // ✅ 提取后同步到 query_phone（如果你要保持 order_id -> query_phone）
      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;

      // 可选：加编辑锁，避免 query_phone 被其他逻辑覆盖
      window.__queryEditingLockUntil = Date.now() + 10 * 1000;
      return;
    }

    // ✅ 手机端常见：拿不到剪贴板内容 → 不阻止默认粘贴
    setTimeout(() => {
      extractAndSet(el.value, 'paste-fallback');

      // ✅ 同步到 query_phone
      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;

      window.__queryEditingLockUntil = Date.now() + 10 * 1000;
    }, 0);
  });

  // ✅ 兜底：部分手机粘贴不触发 paste / clipboardData 为空
  el.addEventListener('input', function () {
    const v = String(el.value || '');
    // 只有当包含“非典型兑换码字符”（中文/空格/标点等）时才提取，避免影响正常输入
    if (/[^\w-]/.test(v)) {
      extractAndSet(v, 'input-sanitize');

      // ✅ 同步到 query_phone
      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;
    }
  });
})();

const phoneInput = document.getElementById("phone");

const orderIdInput = document.getElementById("order_id");
const queryInput = document.getElementById("query_phone");

// =========================
// ✅ 手机号：粘贴只提取 11 位手机号（不再同步 query_phone）
// =========================
if (phoneInput) {
  phoneInput.addEventListener("paste", function (e) {
    e.preventDefault();
    const pastedText = (e.clipboardData || window.clipboardData).getData("text");
    const cleaned = pastedText.replace(/\D/g, '');
    const match = cleaned.match(/1[3-9]\d{9}/);

    if (match) {
      this.value = match[0];
      console.log("📥 粘贴手机号成功：", match[0]);
    } else {
      console.warn("❌ 粘贴内容中未识别出合法手机号");
    }
  });
}

// =========================
// ✅ 通用：去掉所有空白（空格、全角空格、换行、tab）
// =========================
function normalizeNoSpace(el) {
  if (!el) return;
  el.value = (el.value || '').replace(/\s+/g, '');
}

// （原来的 bindPhoneSanitizer 名字虽然叫 phone，但实际只是去空白，这里保留用法）
function bindNoSpaceSanitizer(inputId) {
  const el = document.getElementById(inputId);
  if (!el) return;

  el.addEventListener('input', () => normalizeNoSpace(el));
  el.addEventListener('compositionend', () => normalizeNoSpace(el));
  el.addEventListener('paste', () => setTimeout(() => normalizeNoSpace(el), 0));
  el.addEventListener('blur', () => normalizeNoSpace(el));
}

// ✅ 仍然对这些输入框去空白（不会删字母，安全）
bindNoSpaceSanitizer('phone');
bindNoSpaceSanitizer('order_id');
bindNoSpaceSanitizer('query_phone');

// =========================
// ✅ 兑换码(order_id) -> 查询进度(query_phone) 自动同步（核心改动）
// =========================
(function bindOrderIdToQuerySync() {
  if (!orderIdInput || !queryInput) return;

  const sync = (reason) => {
    const v = String(orderIdInput.value || '').replace(/\s+/g, '').trim();
    queryInput.value = v;
    console.log(`✅ query_phone 同步成功（${reason}）：`, v);
  };

  orderIdInput.addEventListener('input', () => sync('input'));
  orderIdInput.addEventListener('compositionend', () => sync('compositionend'));
  orderIdInput.addEventListener('paste', () => setTimeout(() => sync('paste'), 0));
  orderIdInput.addEventListener('blur', () => sync('blur'));
})();

// =========================
// ✅ 粘贴验证码：自动提取6位验证码（保留原逻辑）
// =========================
if (codeInput) {
  codeInput.addEventListener("paste", function (e) {
    e.preventDefault();
    const pastedText = (e.clipboardData || window.clipboardData).getData("text");
    const cleaned = pastedText.replace(/\D/g, '');
    const match = cleaned.match(/\d{6}/);
    if (match) this.value = match[0];

}

    presetList.style.display = 'none';

    // ✅ 关键：选择预设时，也同步到查询进度框
    if (queryInput) queryInput.value = order;
  });

  document.addEventListener('click', function (event) {
    if (!presetList.contains(event.target) && event.target !== orderIdInput) {
      presetList.style.display = 'none';
    }
  });
}

// =========================
// ✅ 复制到剪贴板（保留原逻辑）
// =========================
function copyToClipboard(text) {
  const val = String(text ?? '');
  if (!val) return;

  const okMsg = () => {
    if (window.layer && typeof layer.msg === 'function') layer.msg('已复制');
  };

  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    navigator.clipboard.writeText(val).then(okMsg).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = val;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      okMsg();
    });
    return;
  }

  const ta = document.createElement('textarea');
  ta.value = val;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  okMsg();
}

function copyUserID(userid) {
  copyToClipboard(userid);
}
// =========================
// ✅ 实时校验 + 右侧提示 + 全对自动提交
// =========================
(function bindLiveValidateAndAutoSubmit() {
  const phoneEl = document.getElementById('phone');
  const codeEl = document.getElementById('code');
  const orderEl = document.getElementById('order_id');

  const tipPhone = document.getElementById('tip_phone');
  const tipCode = document.getElementById('tip_code');
  const tipOrder = document.getElementById('tip_order_id');

  if (!phoneEl || !codeEl || !orderEl) return;

  const rePhone = /^1[3-9]\d{9}$/;
  const reCode = /^\d{6}$/;
  // ✅ 这里跟你 submitUserInfo() 里的规则一致：纯字母数字，8-30 位
  const reOrder = /^[A-Za-z0-9]{8,30}$/;

  function setTip(tipEl, ok, msg, val) {
    if (!tipEl) return;
    const v = String(val || '').trim();
    if (!v) { // ✅ 为空不提示
      tipEl.style.display = 'none';
      tipEl.textContent = msg || '格式不对';
      return;
    }
    if (ok) {
      tipEl.style.display = 'none';
      tipEl.textContent = msg || '格式不对';
    } else {
      tipEl.textContent = msg || '格式不对';
      tipEl.style.display = 'inline-block';
    }
  }

  function isAllValid() {
    const phone = String(phoneEl.value || '').trim();
    const code = String(codeEl.value || '').trim();
    const order = String(orderEl.value || '').trim();
    return rePhone.test(phone) && reCode.test(code) && reOrder.test(order);
  }

  // ✅ 防抖：避免每个键都触发一次提交
  let t = null;
  function validateAndMaybeSubmit() {
    const phone = String(phoneEl.value || '').trim();
    const code = String(codeEl.value || '').trim();
    const order = String(orderEl.value || '').trim();

    setTip(tipPhone, rePhone.test(phone), '手机号格式不对', phone);
    setTip(tipCode, reCode.test(code), '验证码应为6位数字', code);
    setTip(tipOrder, reOrder.test(order), '兑换码格式不对', order);

    clearTimeout(t);
    t = setTimeout(() => {
      // 三个都对 -> 自动提交（等于自动点按钮）
      // ✅ inFlightSubmit 是你原本就有的防重锁
      if (typeof submitUserInfo === 'function' && !window.inFlightSubmit && isAllValid()) {
        submitUserInfo();
      }
    }, 180);
  }

  // 监听：输入/粘贴/失焦都校验
  ['input', 'blur', 'paste', 'compositionend'].forEach(evt => {
    phoneEl.addEventListener(evt, () => setTimeout(validateAndMaybeSubmit, 0));
    codeEl.addEventListener(evt, () => setTimeout(validateAndMaybeSubmit, 0));
    orderEl.addEventListener(evt, () => setTimeout(validateAndMaybeSubmit, 0));
  });

  // 页面初始化跑一次（避免刷新后已有值但没提示）
  setTimeout(validateAndMaybeSubmit, 0);
})();
</script>
