  <script>
const API_BASE = "";

function api(path) {
  return path;
}

    function showSpinner(msg) {
      return layer.load(1, { content: msg, shade: [0.4, '#000'] });
    }
    function hideSpinner() {
      layer.closeAll('loading');
    }


function checkOrderValidityBeforeSend(orderID) {
  return $.ajax({
    url: api('/check_order_validity'),
    type: 'POST',
    contentType: 'application/json',
    dataType: 'json',
    data: JSON.stringify({ order_id: orderID }),
    timeout: 8000
  }).then(function(res) {
    // 兼容多种可能的后端返回格式
    if (
      res === true ||
      res === "true" ||
      res === "1" ||
      res.valid === true ||
      res.ok === true ||
      res.code === 0 ||
      res.status === "success" ||
      res.status === "valid"
    ) {
      return true;
    }

    const msg = res.msg || res.message || "兑换码无效，请检查后重新粘贴";
    layer.msg(msg);
    return false;
  }).catch(function() {
    layer.msg("兑换码校验失败，请稍后重试");
    return false;
  })
  .catch(err => {
    layer.closeAll();
    console.error('[submitUserInfo] error', err);
    layer.alert(err.message || "提交失败，请重试", { icon: 2 });
  });
}


// 全局锁（初始值必须是false）
let isSendingCode = false;

async function getCode() {
  // 1. 立即拦截重复点击
  if (isSendingCode) return;

  const phone = $('#phone').val().trim();

  // 先读取、清洗兑换码
  let rawOrderID = $('#order_id').val().trim();
  let match = rawOrderID.match(/\b[A-Za-z0-9]{8,30}\b/);
  let orderID = match ? match[0] : '';
  $('#order_id').val(orderID);

  if (!orderID) {
    layer.msg("请先粘贴兑换码");
    $('#order_id').focus();
    return;
  }

  if (!/^[A-Za-z0-9]{8,30}$/.test(orderID)) {
    layer.msg("兑换码格式不正确");
    $('#order_id').focus();
    return;
  }

  if (!/^1[3-9]\d{9}$/.test(phone)) {
    layer.msg("请输入正确的11位手机号");
    return;
  }

  // 2. 先锁住按钮，避免重复点击
  const btn = $('#getCodeBtn');
  btn.prop('disabled', true);
  isSendingCode = true;

  // 3. 先校验兑换码是否有效
  showSpinner("正在校验兑换码...");
  const orderValid = await checkOrderValidityBeforeSend(orderID);
  hideSpinner();

  if (!orderValid) {
    btn.prop('disabled', false);
    isSendingCode = false;
    return;
  }

  // 4. 检查验证码发送间隔
  $.ajax({
    url: api('/check_send_interval'),
    type: 'GET',
    data: { phone },
    timeout: 5000,
    success: function(res) {
      if (!res.valid) {
        layer.msg(res.msg || "请稍后再试");
        btn.prop('disabled', false);
        isSendingCode = false;
        return;
      }

      const data = {
        token: phone,
        UrlsID: "",
        orderID: orderID,
        zhanghu: "no",
        huiyuanguize: "0",
        lingqu3: "0",
        shougong: "0",
        qdzhb: "0",
        applogin: "0",
        weblog: "0",
        init: "1",
        yzm_status: "1",
        type: "fasong"
      };

      showSpinner("正在发送验证码...");
      $.ajax({
        url: api("/sfyzm"),
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(data),
        timeout: 10000,
        success: function(res) {
          hideSpinner();
          layer.msg(res.msg || "验证码已发送");
          startCodeTimer();
        },
        error: function() {
          hideSpinner();
          layer.msg("发送失败");
          btn.prop('disabled', false);
          isSendingCode = false;
        }
      });
    },
    error: function() {
      layer.msg("检查发送状态失败，请重试");
      btn.prop('disabled', false);
      isSendingCode = false;
    }
  });
}

function startCodeTimer() {
  const btn = $('#getCodeBtn');
  let t = 30;
  btn.text("已发送(" + t + "s)").prop('disabled', true); // 确保禁用（倒计时期间按钮不可点）
  const timer = setInterval(() => {
    if (--t <= 0) {
      clearInterval(timer);
      // 倒计时结束：恢复按钮 + 释放锁（核心修复点）
      btn.text("获取验证码").prop('disabled', false);
      isSendingCode = false; // 仅在这里释放锁！
    } else {
      btn.text("已发送(" + t + "s)");
    }
  }, 1000);
}

// 提交用户信息的防重锁
let inFlightSubmit = false;
// 确认充值的防重锁
let inFlightRecharge = false;

function genIdemKey() {
  return (Date.now().toString(36) + Math.random().toString(36).slice(2));
}

function submitUserInfo() {
  // 1. 前端立即拦截重复点击
  if (inFlightSubmit) return;
  inFlightSubmit = true;

  // 2. 按钮立即禁用（覆盖所有提交按钮）
  const submitBtns = $('.btn1,#submitBtn');
  submitBtns.prop('disabled', true).css('cursor', 'not-allowed'); // 增加样式提示

  // —— 原有数据清洗逻辑（不变） —— //
  let rawPhone = $('#phone').val().trim();
  let rawCode = $('#code').val().trim();
  let rawOrderID = $('#order_id').val().trim();

  const phone = rawPhone.replace(/[^\d]/g, '').slice(0, 11);
  const code = rawCode.replace(/[^\d]/g, '').slice(0, 6);
  let match = rawOrderID.match(/\b[A-Za-z0-9]{8,30}\b/);
  let orderID = match ? match[0] : '';

  $('#phone').val(phone);
  $('#code').val(code);
  $('#order_id').val(orderID);

  if (!/^1[3-9]\d{9}$/.test(phone)) {
    layer.msg("手机号不正确");
    // 校验失败：释放锁 + 恢复按钮
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
    return;
  }
  if (!/^\d{6}$/.test(code)) {
    layer.msg("请输入6位数字验证码");
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
    return;
  }
  if (!orderID) {
    layer.msg("请粘贴包含有效的兑换码");
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
    return;
  }
  if (!/^[A-Za-z0-9]{8,30}$/.test(orderID)) {
    layer.msg("兑换码错误（不能包含中文或符号）");
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
    return;
  }

  // —— loading弹层（不变） —— //
  const loadingIndex = layer.open({
    type: 1, shade: 0.3, shadeClose: false, title: false, closeBtn: 0,
    area: ['280px', '180px'], offset: 'auto',
    content:`
      <div style="text-align:center;padding:20px;">
        <div class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop" 
            style="font-size:30px;color:#1890ff;"></div>
        <div style="margin-top:10px;font-size:16px;color:#333;">请勿关闭，30秒后确认一下您账号！</div>
        
        <div style="margin-top:10px;font-size:13px;color:#ff0000;">如果没跳转？刷新页面查询进度看看</div>
      </div>`
  });

  // 幂等键（不变）
  const idem = genIdemKey();

  // —— 提交请求（补全finally兜底） —— //
  fetch(api('/submit'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Idempotency-Key': idem },
    body: JSON.stringify({ phone, code, order_id: orderID })
  })
  .then(async r => {
    const res = await r.json().catch(() => ({}));
    if (!r.ok) {
      console.error('[submitUserInfo] submit failed', r.status, res);
      throw new Error(res.message || res.msg || ('提交失败，HTTP ' + r.status));
    }
    return res;
  })
  .then(res => {
    layer.close(loadingIndex);

    window.currentRecordID = res.record_id;
    window.currentPhone = phone;
    window.currentCode = code;
    window.currentOrderID = orderID;

    if (res.status === 'error') {
      layer.alert("提交失败: " + (res.message || '未知错误'));
    } else if (res.status === 'single') {
      showAccountPopup([{ nickname: res.nickname, userid: res.userid, pic: res.pic }]);
    } else if (res.status === 'multiple') {
      showAccountPopup(res.accounts || []);
    } else if (res.status === 'new_user') {
      layer.alert("账号未注册，请先将账号登录到您设备上后，重新提交充值");
    } else if (res.status === 'code_error') {
      layer.alert("验证码错误或已失效,请重新操作！");
    } else {
      layer.alert("服务器繁忙，请重试");
    }
  })
  .catch(() => {
    layer.close(loadingIndex);
    layer.alert("没跳转？点查询进度看看");
  })
  .finally(() => {
    // 无论成功/失败，最终释放锁 + 恢复按钮
    inFlightSubmit = false;
    submitBtns.prop('disabled', false).css('cursor', 'pointer');
  });
}



function showAccountPopup(accounts) {
  // ✅ 使用 window 缓存的手机号、验证码、订单号
  // ✅ 如果变量不存在，尝试从输入框中兜底赋值一次
  window.currentPhone = window.currentPhone || $('#phone').val().trim();
  window.currentCode = window.currentCode || $('#code').val().trim();
  window.currentOrderID = window.currentOrderID || $('#order_id').val().trim();

  // ✅ 头像默认占位（无需外链，避免再引入 mixed content）
  const defaultAvatar =
    "data:image/svg+xml;utf8," +
    encodeURIComponent(
      "<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50'>" +
      "<rect width='100%' height='100%' rx='6' ry='6' fill='#eee'/>" +
      "<text x='50%' y='55%' text-anchor='middle' font-size='18' fill='#999' font-family='Arial'>?</text>" +
      "</svg>"
    );

  let html = '<div style="padding:10px">';

  (accounts || []).forEach((acc, i) => {
    // ✅ 如果不是 https，强制替换成 https
    let pic = (acc && acc.pic) ? String(acc.pic) : "";
    if (/^http:\/\//i.test(pic)) pic = pic.replace(/^http:\/\//i, "https://");
    if (!pic) pic = defaultAvatar;

    html += `
      <div style="display:flex;align-items:center;margin-bottom:10px;">
        <img
          src="${pic}"

}


function submitRecharge() {
  // 1. 前端立即拦截重复点击
  if (inFlightRecharge) return;
  inFlightRecharge = true;

  // 2. 禁用确认按钮（先找到弹窗内的确认按钮）
  const rechargeBtn = $('button:contains("确认兑换")');
  rechargeBtn.prop('disabled', true).css({ 
    'cursor': 'not-allowed', 
    'background': '#ccc' // 视觉上提示禁用
  });

  // —— 原有数据获取逻辑（不变） —— //
  const zhanghu = $('input[name="account"]:checked').val();
  const phone = window.currentPhone || $('#phone').val().trim();
  const code = window.currentCode || $('#code').val().trim();
  const orderID = window.currentOrderID || $('#order_id').val().trim();

  // —— 后端重复检查 + 业务逻辑（补全异常释放锁） —— //
  $.ajax({
    url: api('/check_recharge_duplicate'),
    type: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ phone, code, order_id: orderID, source: 'tel' }),
    success: res => {
      if (res.duplicate) {
        layer.alert("2分钟内已经提交过了，请勿重复提交", { icon: 0 });
        // 检查重复：释放锁 + 恢复按钮
        inFlightRecharge = false;
        rechargeBtn.prop('disabled', false).css({ 
          'cursor': 'pointer', 
          'background': '#1890ff' 
        });
        return;
      }

      // —— 原有北京时间判断逻辑（不变） —— //
      const now = new Date();
      const beijing = new Date(now.getTime() + 8 * 60 * 60 * 1000);
      const day = beijing.getUTCDay();
      const hour = beijing.getUTCHours();
      const minute = beijing.getUTCMinutes();

      let lingqu3 = "1";
      let qdzhb = "0";

      if (day >= 0 && day <= 6) {
        if (hour >= 7 && hour < 24) {
          lingqu3 = "1";
        }
      }

      if (hour >= 8 && hour < 13) {
        qdzhb = "1";
      }

      console.log("📅 北京时间:", beijing.toISOString(), "星期:", day, "lingqu3:", lingqu3);

      // —— 组装数据提交（不变） —— //
      const data = {
        token: phone,
        UrlsID: code,
        orderID,
        zhanghu,
        huiyuanguize: "0",
        qdzhb: qdzhb,
        shougong: "0",
        lingqu3: lingqu3,
        applogin: "1",
        weblog: "1",
        init: "0",
        yzm_status: "3",
        type: "chongzhi",
        record_id: window.currentRecordID
      };

      layer.closeAll();
      const idx = showSpinner("正在充值，请稍候...");
      $.ajax({
        url: api("/api"), type: "POST", contentType: "application/json",
        data: JSON.stringify(data),
        success: res => {
          hideSpinner();
          layer.alert(
            '正在充值，等<span style="color:red;font-weight:bold;font-size:18px;">6分钟</span>左右到账。',
            { icon: 1 }
          );
        },

        error: () => {
          hideSpinner();
          layer.alert("提交失败，请重试", { icon: 2 });
        },
        complete: () => {
          // 充值请求完成（成功/失败）：释放锁 + 恢复按钮
          inFlightRecharge = false;
          rechargeBtn.prop('disabled', false).css({ 
            'cursor': 'pointer', 
            'background': '#1890ff' 
          });
        }
      });
    },
    error: () => {
      layer.msg("网络异常，请稍后重试");
      // 检查请求失败：释放锁 + 恢复按钮
      inFlightRecharge = false;
      rechargeBtn.prop('disabled', false).css({ 
        'cursor': 'pointer', 
        'background': '#1890ff' 
      });
    }
  });
}

(function bindOrderIdExtractorMobileSafe() {
  const el = document.getElementById('order_id');
  if (!el) return;

  // 兑换码规则：字母数字下划线/中划线，长度 6-64（按你之前校验一致）
  const codeRe = /[a-zA-Z0-9_-]{6,64}/;

  function extractAndSet(raw, reason) {
    const text = String(raw || '');

    // 1) 先提取兑换码（因为这里是兑换码输入框，优先兑换码更符合预期）
    const codeMatch = text.match(codeRe);
    if (codeMatch) {
      el.value = codeMatch[0];
      console.log(`📥 order_id 提取兑换码（${reason}）：`, el.value);
      return true;
    }

    // 2) 再兜底提取手机号（如果用户把手机号也粘到兑换码框里）
    const cleanedDigits = text.replace(/\D/g, '');
    const phoneMatch = cleanedDigits.match(/1[3-9]\d{9}/);
    if (phoneMatch) {
      el.value = phoneMatch[0];
      console.log(`📥 order_id 提取手机号（${reason}）：`, el.value);
      return true;
    }

    // 3) 都提取不到就去空白（可选）
    el.value = text.replace(/\s+/g, '').trim();
    console.warn(`⚠️ order_id 未识别到兑换码/手机号（${reason}），已去空白：`, el.value);
    return false;
  }

  // ✅ PC：能读到 clipboardData 就直接用
  el.addEventListener('paste', function (e) {
    const cd = e.clipboardData || window.clipboardData;
    const clipText = cd && cd.getData ? cd.getData('text') : '';

    if (clipText) {
      // PC/部分安卓能拿到剪贴板：直接提取，并阻止默认粘贴避免闪一下
      e.preventDefault();
      extractAndSet(clipText, 'paste-clipboard');

      // ✅ 提取后同步到 query_phone（如果你要保持 order_id -> query_phone）
      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;

      // 可选：加编辑锁，避免 query_phone 被其他逻辑覆盖
      window.__queryEditingLockUntil = Date.now() + 10 * 1000;
      return;
    }

    // ✅ 手机端常见：拿不到剪贴板内容 → 不阻止默认粘贴
    setTimeout(() => {
      extractAndSet(el.value, 'paste-fallback');

      // ✅ 同步到 query_phone
      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;

      window.__queryEditingLockUntil = Date.now() + 10 * 1000;
    }, 0);
  });

  // ✅ 兜底：部分手机粘贴不触发 paste / clipboardData 为空
  el.addEventListener('input', function () {
    const v = String(el.value || '');
    // 只有当包含“非典型兑换码字符”（中文/空格/标点等）时才提取，避免影响正常输入
    if (/[^\w-]/.test(v)) {
      extractAndSet(v, 'input-sanitize');

      // ✅ 同步到 query_phone
      const q = document.getElementById('query_phone');
      if (q) q.value = el.value;
    }
  });
})();

const phoneInput = document.getElementById("phone");

const orderIdInput = document.getElementById("order_id");
const queryInput = document.getElementById("query_phone");

// =========================
// ✅ 手机号：粘贴只提取 11 位手机号（不再同步 query_phone）
// =========================
if (phoneInput) {
  phoneInput.addEventListener("paste", function (e) {
    e.preventDefault();
    const pastedText = (e.clipboardData || window.clipboardData).getData("text");
    const cleaned = pastedText.replace(/\D/g, '');
    const match = cleaned.match(/1[3-9]\d{9}/);

    if (match) {
      this.value = match[0];
      console.log("📥 粘贴手机号成功：", match[0]);
    } else {
      console.warn("❌ 粘贴内容中未识别出合法手机号");
    }
  });
}

// =========================
// ✅ 通用：去掉所有空白（空格、全角空格、换行、tab）
// =========================
function normalizeNoSpace(el) {
  if (!el) return;
  el.value = (el.value || '').replace(/\s+/g, '');
}

// （原来的 bindPhoneSanitizer 名字虽然叫 phone，但实际只是去空白，这里保留用法）
function bindNoSpaceSanitizer(inputId) {
  const el = document.getElementById(inputId);
  if (!el) return;

  el.addEventListener('input', () => normalizeNoSpace(el));
  el.addEventListener('compositionend', () => normalizeNoSpace(el));
  el.addEventListener('paste', () => setTimeout(() => normalizeNoSpace(el), 0));
  el.addEventListener('blur', () => normalizeNoSpace(el));
}

// ✅ 仍然对这些输入框去空白（不会删字母，安全）
bindNoSpaceSanitizer('phone');
bindNoSpaceSanitizer('order_id');
bindNoSpaceSanitizer('query_phone');

// =========================
// ✅ 兑换码(order_id) -> 查询进度(query_phone) 自动同步（核心改动）
// =========================
(function bindOrderIdToQuerySync() {
  if (!orderIdInput || !queryInput) return;

  const sync = (reason) => {
    const v = String(orderIdInput.value || '').replace(/\s+/g, '').trim();
    queryInput.value = v;
    console.log(`✅ query_phone 同步成功（${reason}）：`, v);
  };

  orderIdInput.addEventListener('input', () => sync('input'));
  orderIdInput.addEventListener('compositionend', () => sync('compositionend'));
  orderIdInput.addEventListener('paste', () => setTimeout(() => sync('paste'), 0));
  orderIdInput.addEventListener('blur', () => sync('blur'));
})();

// =========================
// ✅ 粘贴验证码：自动提取6位验证码（保留原逻辑）
// =========================
if (codeInput) {
  codeInput.addEventListener("paste", function (e) {
    e.preventDefault();
    const pastedText = (e.clipboardData || window.clipboardData).getData("text");
    const cleaned = pastedText.replace(/\D/g, '');
    const match = cleaned.match(/\d{6}/);
    if (match) this.value = match[0];

}

    if (queryInput) queryInput.value = order;
  });

  document.addEventListener('click', function (event) {
    if (!presetList.contains(event.target) && event.target !== orderIdInput) {
      presetList.style.display = 'none';
    }
  });
}

// ✅ 复制到剪贴板（保留原逻辑）
// =========================
function copyToClipboard(text) {
  const val = String(text ?? '');
  if (!val) return;

  const okMsg = () => {
    if (window.layer && typeof layer.msg === 'function') layer.msg('已复制');
  };

  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    navigator.clipboard.writeText(val).then(okMsg).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = val;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      okMsg();
    });
    return;
  }

  const ta = document.createElement('textarea');
  ta.value = val;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  okMsg();
}

function copyUserID(userid) {
  copyToClipboard(userid);
}

// ✅ 实时校验 + 右侧提示 + 全对自动提交
// =========================
(function bindLiveValidateAndAutoSubmit() {
  const phoneEl = document.getElementById('phone');
  const codeEl = document.getElementById('code');
  const orderEl = document.getElementById('order_id');

  const tipPhone = document.getElementById('tip_phone');
  const tipCode = document.getElementById('tip_code');
  const tipOrder = document.getElementById('tip_order_id');

  if (!phoneEl || !codeEl || !orderEl) return;

  const rePhone = /^1[3-9]\d{9}$/;
  const reCode = /^\d{6}$/;
  // ✅ 这里跟你 submitUserInfo() 里的规则一致：纯字母数字，8-30 位
  const reOrder = /^[A-Za-z0-9]{8,30}$/;

  function setTip(tipEl, ok, msg, val) {
    if (!tipEl) return;
    const v = String(val || '').trim();
    if (!v) { // ✅ 为空不提示
      tipEl.style.display = 'none';
      tipEl.textContent = msg || '格式不对';
      return;
    }
    if (ok) {
      tipEl.style.display = 'none';
      tipEl.textContent = msg || '格式不对';
    } else {
      tipEl.textContent = msg || '格式不对';
      tipEl.style.display = 'inline-block';
    }
  }

  function isAllValid() {
    const phone = String(phoneEl.value || '').trim();
    const code = String(codeEl.value || '').trim();
    const order = String(orderEl.value || '').trim();
    return rePhone.test(phone) && reCode.test(code) && reOrder.test(order);
  }

  // ✅ 防抖：避免每个键都触发一次提交
  let t = null;
  function validateAndMaybeSubmit() {
    const phone = String(phoneEl.value || '').trim();
    const code = String(codeEl.value || '').trim();
    const order = String(orderEl.value || '').trim();

    setTip(tipPhone, rePhone.test(phone), '手机号格式不对', phone);
    setTip(tipCode, reCode.test(code), '验证码应为6位数字', code);
    setTip(tipOrder, reOrder.test(order), '兑换码格式不对', order);

    clearTimeout(t);
    t = setTimeout(() => {
      // 三个都对 -> 自动提交（等于自动点按钮）
      // ✅ inFlightSubmit 是你原本就有的防重锁
      if (typeof submitUserInfo === 'function' && !window.inFlightSubmit && isAllValid()) {
        submitUserInfo();
      }
    }, 180);
  }

  // 监听：输入/粘贴/失焦都校验
  ['input', 'blur', 'paste', 'compositionend'].forEach(evt => {
    phoneEl.addEventListener(evt, () => setTimeout(validateAndMaybeSubmit, 0));
    codeEl.addEventListener(evt, () => setTimeout(validateAndMaybeSubmit, 0));
    orderEl.addEventListener(evt, () => setTimeout(validateAndMaybeSubmit, 0));
  });

  // 页面初始化跑一次（避免刷新后已有值但没提示）
  setTimeout(validateAndMaybeSubmit, 0);
})();
</script>

<script>
(function () {
  const STORE_PREFIX = 'koko_virtual_progress_duration_v1:';

  const TASKS = {
    sfyzm: {
      title: '正在发送验证码',
      tips: '正在连接浏览器并请求验证码，请勿关闭页面',
      fallbackMs: 9000
    },
    submit: {
      title: '正在提交兑换',
      tips: '正在识别账号并提交兑换，请勿关闭页面',
      fallbackMs: 25000
    },
    api_fasong: {
      title: '正在保存验证码任务',
      tips: '正在保存信息并创建验证码任务',
      fallbackMs: 5000
    },
    api_chongzhi: {
      title: '正在确认兑换任务',
      tips: '正在提交兑换任务，请勿关闭页面',
      fallbackMs: 25000
    },
    api: {
      title: '正在处理请求',
      tips: '请稍候，系统正在处理',
      fallbackMs: 12000
    }
  };

  function nowMs() {
    return Date.now();
  }

  function safeJsonParse(text) {
    try { return JSON.parse(text); } catch (e) { return null; }
  }

  function getHistory(taskKey) {
    try {
      const arr = JSON.parse(localStorage.getItem(STORE_PREFIX + taskKey) || '[]');
      return Array.isArray(arr) ? arr.filter(x => Number.isFinite(x) && x > 300 && x < 600000) : [];
    } catch (e) {
      return [];
    }
  }

  function saveDuration(taskKey, ms) {
    if (!taskKey || !Number.isFinite(ms) || ms <= 300) return;

    const arr = getHistory(taskKey);
    arr.push(ms);

    while (arr.length > 50) arr.shift();
    localStorage.setItem(STORE_PREFIX + taskKey, JSON.stringify(arr));
  }

  function avgDuration(taskKey, fallbackMs) {
    const arr = getHistory(taskKey);
    if (!arr.length) return fallbackMs;

    const sum = arr.reduce((a, b) => a + b, 0);
    const avg = sum / arr.length;

    // 防止极端值导致进度条太快或太慢
    return Math.max(3000, Math.min(avg, 120000));
  }

  function formatSecond(ms) {
    return Math.max(1, Math.round(ms / 1000));
  }

  function classifyRequest(url, method, body) {
    const u = String(url || '');
    const m = String(method || 'GET').toUpperCase();

    if (m !== 'POST' && m !== 'GET') return null;

    if (u.includes('/sfyzm')) {
      return { key: 'sfyzm', ...TASKS.sfyzm };
    }

    if (u.includes('/submit')) {
      return { key: 'submit', ...TASKS.submit };
    }

    if (u === 'api' || u.endsWith('/api') || u.includes('/api?') || u.includes('/api/')) {
      let data = body;

      if (typeof data === 'string') {
        data = safeJsonParse(data) || {};
      }

      const type = data && data.type ? String(data.type) : '';

      if (type === 'fasong') {
        return { key: 'api_fasong', ...TASKS.api_fasong };
      }

      if (type === 'chongzhi') {
        return { key: 'api_chongzhi', ...TASKS.api_chongzhi };
      }

      return { key: 'api', ...TASKS.api };
    }

    return null;
  }

  function getLayer(callback) {
    if (window.layui && layui.layer) {
      callback(layui.layer);
      return;
    }

    if (window.layui && layui.use) {
      layui.use(['layer'], function () {
        callback(layui.layer);
      });
      return;
    }

    callback(null);
  }

  function openVirtualProgress(task) {
    const expectedMs = avgDuration(task.key, task.fallbackMs || 15000);
    const start = nowMs();
    let layerIndex = null;
    let timer = null;
    let done = false;

    const html = `
      <div style="padding:22px 24px 20px 24px;width:300px;box-sizing:border-box;">
        <div style="font-size:17px;font-weight:600;color:#222;text-align:center;">${task.title}</div>
        <div style="font-size:12px;color:#777;text-align:center;margin-top:6px;">${task.tips}</div>

        <div style="margin-top:18px;background:#eef2f7;border-radius:999px;height:14px;overflow:hidden;">
          <div id="koko_vp_bar" style="height:14px;width:3%;border-radius:999px;background:linear-gradient(90deg,#1890ff,#52c41a);transition:width .25s;"></div>
        </div>

        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#666;">
          <span id="koko_vp_percent">3%</span>
          <span id="koko_vp_time">预计 ${formatSecond(expectedMs)} 秒</span>
        </div>

        <div id="koko_vp_hint" style="font-size:12px;color:#999;text-align:center;margin-top:10px;">
          系统正在处理，请勿重复点击
        </div>
      </div>
    `;

    function calcPercent(elapsed) {
      const ratio = elapsed / expectedMs;

      // 0% - 70%：较快推进
      if (ratio < 0.65) {
        return 3 + ratio * 105;
      }

      // 70% - 92%：中速推进
      if (ratio < 1.0) {
        return 71 + (ratio - 0.65) * 60;
      }

      // 超过平均耗时后，最多卡在 96%，直到接口真的返回
      if (ratio < 1.8) {
        return 92 + (ratio - 1.0) * 5;
      }

      return 96;
    }

    function setProgress(percent, text) {
      const p = Math.max(0, Math.min(100, Math.round(percent)));
      const bar = document.getElementById('koko_vp_bar');
      const pct = document.getElementById('koko_vp_percent');
      const tm = document.getElementById('koko_vp_time');
      const hint = document.getElementById('koko_vp_hint');

      if (bar) bar.style.width = p + '%';
      if (pct) pct.textContent = p + '%';
      if (tm) tm.textContent = text || `已等待 ${formatSecond(nowMs() - start)} 秒`;
      if (hint && p >= 92) hint.textContent = '即将完成，正在等待最终结果';
    }

    getLayer(function (layer) {
      if (!layer) return;

      layerIndex = layer.open({
        type: 1,
        title: false,
        closeBtn: 0,
        shade: [0.35, '#000'],
        shadeClose: false,
        area: ['350px', '190px'],
        content: html
      });

      timer = setInterval(function () {
        if (done) return;
        const elapsed = nowMs() - start;
        setProgress(calcPercent(elapsed));
      }, 250);
    });

    return {
      finish: function (ok) {
        done = true;
        if (timer) clearInterval(timer);

        saveDuration(task.key, nowMs() - start);

        setProgress(100, ok ? '已完成' : '请求结束');

        setTimeout(function () {
          if (window.layui && layui.layer && layerIndex !== null) {
            layui.layer.close(layerIndex);
          }
        }, 350);
      }
    };
  }

  // 包装 fetch：用于 /submit、/sfyzm 等
  if (window.fetch && !window.fetch.__kokoProgressWrapped) {
    const rawFetch = window.fetch;

    const wrappedFetch = function (input, init) {
      const url = typeof input === 'string' ? input : (input && input.url);
      const method = (init && init.method) || 'GET';
      const body = init && init.body;

      const task = classifyRequest(url, method, body);
      const progress = task ? openVirtualProgress(task) : null;

      return rawFetch.apply(this, arguments)
        .then(function (res) {
          if (progress) progress.finish(res.ok);
          return res;
        })
        .catch(function (err) {
          if (progress) progress.finish(false);
          throw err;
        });
    };

    wrappedFetch.__kokoProgressWrapped = true;
    window.fetch = wrappedFetch;
  }

  // 包装 jQuery ajax：用于老代码 $.ajax({url:"api", data:{type:"fasong/chongzhi"}})
  if (window.jQuery && $.ajax && !$.ajax.__kokoProgressWrapped) {
    const rawAjax = $.ajax;

    $.ajax = function (options) {
      const opt = options || {};
      const task = classifyRequest(opt.url, opt.type || opt.method || 'GET', opt.data);
      const progress = task ? openVirtualProgress(task) : null;

      const jq = rawAjax.apply(this, arguments);

      if (progress && jq && jq.always) {
        jq.always(function () {
          progress.finish(true);
        });
      }

      return jq;
    };

    $.ajax.__kokoProgressWrapped = true;
  }
})();
</script>

<script>
(function(){
  const TOTAL_MS = 6 * 60 * 1000;
  const STORE_KEY = 'koko_recharge_6min_progress_v1';
  const PATCH_FLAG = '__kokoRecharge6MinProgressInstalled';

  if (window[PATCH_FLAG]) return;
  window[PATCH_FLAG] = true;

  function now(){ return Date.now(); }

  function pad2(n){ return String(n).padStart(2,'0'); }

  function formatRemain(ms){
    ms = Math.max(0, ms);
    const sec = Math.ceil(ms / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${pad2(s)}`;
  }

  function calcPercent(startAt){
    const elapsed = Math.max(0, now() - startAt);
    if (elapsed >= TOTAL_MS) return 100;

    const ratio = elapsed / TOTAL_MS;

    // 虚拟进度：前期平稳，中后期慢一点，避免太快到100
    let percent;
    if (ratio < 0.25) {
      percent = 3 + ratio * 160;          // 3% - 43%
    } else if (ratio < 0.75) {
      percent = 43 + (ratio - 0.25) * 86; // 43% - 86%
    } else {
      percent = 86 + (ratio - 0.75) * 48; // 86% - 98%
    }
    return Math.min(98, Math.max(1, percent));
  }

  function saveProgress(extra){
    const old = getProgress() || {};
    const data = Object.assign({}, old, extra || {});
    if (!data.startAt) data.startAt = now();
    data.totalMs = TOTAL_MS;
    data.updatedAt = now();
    try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e){}
    return data;
  }

  function getProgress(){
    try {
      const data = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
      if (!data || !data.startAt) return null;
      return data;
    } catch(e){
      return null;
    }
  }

  function getAccountInfoHtml(){
    const el = document.getElementById('accountInfoOutside');
    if (!el) return '';
    const html = el.outerHTML || el.innerHTML || '';
    if (!html.trim()) return '';
    return `<div class="koko-recharge-account-copy">${html}</div>`;
  }

  function defaultText(){
    return `充值中，大概<span class="koko-recharge-progress-warn">6分钟</span>后到账，如未到账可联系客服。`;
  }

  function createProgressHtml(opts){
    opts = opts || {};
    const text = opts.text || defaultText();
    const accountHtml = opts.accountHtml ? getAccountInfoHtml() : '';
    const title = opts.title || '充值进度';
    return `
      <div class="koko-recharge-progress-card" data-koko-recharge-progress="1">
        <div class="koko-recharge-progress-title">
          <span>${title}</span>
          <span class="koko-recharge-progress-percent">1%</span>
        </div>
        <div class="koko-recharge-progress-track">
          <div class="koko-recharge-progress-bar"></div>
        </div>
        <div class="koko-recharge-progress-meta">
          <span class="koko-recharge-progress-elapsed">已提交：0分钟</span>
          <span class="koko-recharge-progress-countdown">剩余：6:00</span>
        </div>
        <div class="koko-recharge-progress-text">${text}</div>
        <div class="koko-recharge-progress-tip">
          已提交充值任务，系统正在处理。可以关闭页面，后续点击“查询进度”也能继续查看进度。
        </div>
        ${accountHtml}
      </div>
    `;
  }

  function updateProgressDom(root, data){
    if (!root || !data || !data.startAt) return;

    const elapsed = Math.max(0, now() - data.startAt);
    const remain = Math.max(0, TOTAL_MS - elapsed);
    const percent = calcPercent(data.startAt);
    const percentText = Math.round(percent) + '%';

    const bar = root.querySelector('.koko-recharge-progress-bar');
    const pct = root.querySelector('.koko-recharge-progress-percent');
    const elapsedEl = root.querySelector('.koko-recharge-progress-elapsed');
    const countdownEl = root.querySelector('.koko-recharge-progress-countdown');
    const textEl = root.querySelector('.koko-recharge-progress-text');

    if (bar) bar.style.width = percent + '%';
    if (pct) pct.textContent = percentText;

    const elapsedMin = Math.max(0, Math.floor(elapsed / 60000));
    if (elapsedEl) elapsedEl.textContent = `已提交：${elapsedMin}分钟`;

    if (countdownEl) {
      countdownEl.textContent = remain > 0 ? `剩余：${formatRemain(remain)}` : '预计时间已到';
    }

    if (textEl && percent >= 100) {
      textEl.innerHTML = `预计到账时间已到，如未到账可联系客服或点击查询进度查看最新状态。`;
    }
  }

  function mountProgressInElement(el, title, text){
    if (!el) return;
    const data = saveProgress({});
    el.innerHTML = createProgressHtml({
      title: title || '充值进度',
      text: text || defaultText(),
      accountHtml: false
    });
    const root = el.querySelector('[data-koko-recharge-progress="1"]');
    updateProgressDom(root, data);
  }

  function refreshAllProgress(){
    const data = getProgress();
    if (!data) return;

    document.querySelectorAll('[data-koko-recharge-progress="1"]').forEach(function(root){
      updateProgressDom(root, data);
    });
  }

  function openRechargeProgressDialog(){
    const data = saveProgress({});
    const html = `
      <div class="koko-recharge-dialog-wrap">
        ${createProgressHtml({
          title:'正在充值',
          text: defaultText(),
          accountHtml:true
        })}
      </div>
    `;

    function openByLayer(layer){
      const index = layer.open({
        type: 1,
        title: false,
        closeBtn: 1,
        shade: [0.35, '#000'],
        shadeClose: false,
        area: ['400px', 'auto'],
        content: html,
        success: function(dom){
          const root = dom[0] ? dom[0].querySelector('[data-koko-recharge-progress="1"]') : null;
          updateProgressDom(root, data);
        }
      });
      return index;
    }

    if (window.layui && layui.layer) {
      return openByLayer(layui.layer);
    }

    if (window.layui && layui.use) {
      layui.use(['layer'], function(){
        openByLayer(layui.layer);
      });
      return;
    }

    alert('充值任务已提交，预计6分钟左右到账。可以关闭页面，后续点击查询进度也能查看进度。');
  }

  function installLayerPatch(){
    if (!window.layui || !layui.layer) return false;
    const layer = layui.layer;
    if (layer.__kokoRechargeProgressPatched) return true;

    const rawAlert = layer.alert;
    const rawMsg = layer.msg;

    layer.alert = function(content){
      const text = String(content || '');
      if (text.indexOf('正在充值') !== -1 && text.indexOf('6分钟') !== -1) {
        openRechargeProgressDialog();
        return 0;
      }
      return rawAlert.apply(this, arguments);
    };

    layer.msg = function(content){
      const text = String(content || '');
      if (text.indexOf('正在充值') !== -1 && text.indexOf('6分钟') !== -1) {
        openRechargeProgressDialog();
        return 0;
      }
      return rawMsg.apply(this, arguments);
    };

    layer.__kokoRechargeProgressPatched = true;
    return true;
  }

  function patchRechargeStatusBoxes(){
    const statusEl = document.getElementById('rechargeStatus');
    const resultEl = document.getElementById('rechargeResult');

    if (statusEl && !statusEl.querySelector('[data-koko-recharge-progress="1"]')) {
      const txt = statusEl.innerText || '';
      if (txt.indexOf('充值中') !== -1 || txt.indexOf('6分钟') !== -1) {
        mountProgressInElement(statusEl, '充值进度', defaultText());
      }
    }

    if (resultEl && !resultEl.querySelector('[data-koko-recharge-progress="1"]')) {
      const txt = resultEl.innerText || '';
      if (txt.indexOf('充值中') !== -1 || txt.indexOf('已提交') !== -1) {
        mountProgressInElement(resultEl, '充值结果', `充值中，系统已提交任务，预计<span class="koko-recharge-progress-warn">6分钟</span>内到账。`);
      }
    }
  }

  function observeRechargeBoxes(){
    const obs = new MutationObserver(function(){
      patchRechargeStatusBoxes();
    });

    obs.observe(document.documentElement, {
      childList:true,
      subtree:true,
      characterData:true
    });
  }

  // 暴露给原有代码或调试使用
  window.kokoStartRecharge6MinProgress = function(){
    saveProgress({startAt: now()});
    openRechargeProgressDialog();
    patchRechargeStatusBoxes();
  };

  // 页面加载后，如果本地有未完成进度，也继续刷新
  document.addEventListener('DOMContentLoaded', function(){
    saveProgress(getProgress() || {});
    installLayerPatch();
    patchRechargeStatusBoxes();
    observeRechargeBoxes();

    setInterval(function(){
      installLayerPatch();
      patchRechargeStatusBoxes();
      refreshAllProgress();
    }, 1000);
  });

  // 兼容脚本在 body 末尾插入但 DOMContentLoaded 已触发的情况
  setTimeout(function(){
    installLayerPatch();
    patchRechargeStatusBoxes();
    observeRechargeBoxes();
    setInterval(refreshAllProgress, 1000);
  }, 500);
})();
</script>
<!-- KOKO_RECHARGE_6MIN_PROGRESS_V1_END -->


<!-- KOKO_PORTAL_FRONTEND_PATCH_V1_START -->
<script>
(function () {
  if (window.__KOKO_PORTAL_FRONTEND_PATCH_V1__) return;
  window.__KOKO_PORTAL_FRONTEND_PATCH_V1__ = true;

  const host = location.hostname;

  const PORTAL_MAP = {
    "cn12.vip": {
      submit_portal: "retail_site",
      submit_domain: "cn12.vip",
      show_buy_entry: true
    },
    "vip.ka8.shop": {
      submit_portal: "agent_site",
      submit_domain: "vip.ka8.shop",
      show_buy_entry: false
    }
  };

  const currentPortal = PORTAL_MAP[host] || {
    submit_portal: "unknown",
    submit_domain: host || "",
    show_buy_entry: false
  };

  window.KOKO_SUBMIT_PORTAL = currentPortal.submit_portal;
  window.KOKO_SUBMIT_DOMAIN = currentPortal.submit_domain;
  window.KOKO_SHOW_BUY_ENTRY = currentPortal.show_buy_entry;

  function isObject(v) {
    return v && typeof v === "object" && !Array.isArray(v);
  }

  function appendPortalToJsonBody(body) {
    let obj = {};

    if (typeof body === "string" && body.trim()) {
      try {
        obj = JSON.parse(body);
      } catch (e) {
        return body;
      }
    } else if (isObject(body)) {
      obj = body;
    }

    if (!isObject(obj)) return body;

    if (!obj.submit_portal) obj.submit_portal = currentPortal.submit_portal;
    if (!obj.submit_domain) obj.submit_domain = currentPortal.submit_domain;

    return JSON.stringify(obj);
  }

  function appendPortalToData(data) {
    if (!data) return data;

    if (typeof FormData !== "undefined" && data instanceof FormData) {
      if (!data.has("submit_portal")) data.append("submit_portal", currentPortal.submit_portal);
      if (!data.has("submit_domain")) data.append("submit_domain", currentPortal.submit_domain);
      return data;
    }

    if (typeof URLSearchParams !== "undefined" && data instanceof URLSearchParams) {
      if (!data.has("submit_portal")) data.append("submit_portal", currentPortal.submit_portal);
      if (!data.has("submit_domain")) data.append("submit_domain", currentPortal.submit_domain);
      return data;
    }

    if (typeof data === "string") {
      const parsed = safeParseJson(data);
      if (parsed) return appendPortalToJsonBody(data);

      const params = new URLSearchParams(data);
      if (!params.has("submit_portal")) params.append("submit_portal", currentPortal.submit_portal);
      if (!params.has("submit_domain")) params.append("submit_domain", currentPortal.submit_domain);
      return params.toString();
    }

    if (isObject(data)) {
      if (!data.submit_portal) data.submit_portal = currentPortal.submit_portal;
      if (!data.submit_domain) data.submit_domain = currentPortal.submit_domain;
      return data;
    }

    return data;
  }

  function safeParseJson(text) {
    try {
      const obj = JSON.parse(text);
      return isObject(obj) ? obj : null;
    } catch (e) {
      return null;
    }
  }

  function shouldPatchApiUrl(url) {
    const u = String(url || "");
    return (
      u === "api" ||
      u.endsWith("/api") ||
      u.includes("/api?") ||
      u.includes("/submit") ||
      u.includes("/sfyzm") ||
      u.includes("/check_order_validity") ||
      u.includes("/check_recharge_duplicate") ||
      u.includes("/get_recharge_status")
    );
  }

  function patchBuyEntryVisibility() {
    const hide = !currentPortal.show_buy_entry;

    const selectorList = [
      "#buyEntry",
      "#purchaseEntry",
      ".buy-entry",
      ".purchase-entry",
      ".koko-buy-entry",
      "[data-buy-entry]",
      "[data-purchase-entry]"
    ];

    selectorList.forEach(function (sel) {
      document.querySelectorAll(sel).forEach(function (el) {
        el.style.display = hide ? "none" : "";
      });
    });

    if (hide) {
      document.querySelectorAll("a,button,div,span,li").forEach(function (el) {
        const text = (el.innerText || "").replace(/\s+/g, "");
        if (!text) return;

        const isBuyText =
          text.includes("购买兑换码") ||
          text.includes("购买卡密") ||
          text.includes("买兑换码") ||
          text.includes("购买会员") ||
          text === "购买";

        if (isBuyText) {
          el.style.display = "none";
        }
      });
    }
  }

  function installFetchPatch() {
    if (!window.fetch || window.fetch.__KOKO_PORTAL_PATCHED__) return;

    const rawFetch = window.fetch;

    const patchedFetch = function (input, init) {
      init = init || {};

      const url = typeof input === "string" ? input : (input && input.url ? input.url : "");

      if (shouldPatchApiUrl(url)) {
        const headers = new Headers(init.headers || {});
        headers.set("X-Submit-Portal", currentPortal.submit_portal);
        headers.set("X-Submit-Domain", currentPortal.submit_domain);
        init.headers = headers;

        const contentType = headers.get("Content-Type") || headers.get("content-type") || "";

        if (init.body) {
          if (contentType.includes("application/json") || typeof init.body === "string") {
            init.body = appendPortalToJsonBody(init.body);
          } else {
            init.body = appendPortalToData(init.body);
          }
        }
      }

      return rawFetch.call(this, input, init);
    };

    patchedFetch.__KOKO_PORTAL_PATCHED__ = true;
    window.fetch = patchedFetch;
  }

  function installAjaxPatch() {
    if (!window.jQuery || !jQuery.ajax || jQuery.ajax.__KOKO_PORTAL_PATCHED__) return;

    const $ = window.jQuery;
    const rawAjax = $.ajax;

    $.ajax = function (options) {
      const opt = options || {};
      const url = opt.url || "";

      if (shouldPatchApiUrl(url)) {
        opt.headers = opt.headers || {};
        opt.headers["X-Submit-Portal"] = currentPortal.submit_portal;
        opt.headers["X-Submit-Domain"] = currentPortal.submit_domain;

        if (opt.contentType && String(opt.contentType).includes("application/json")) {
          opt.data = appendPortalToJsonBody(opt.data || "{}");
        } else {
          opt.data = appendPortalToData(opt.data || {});
        }
      }

      return rawAjax.apply(this, arguments);
    };

    $.ajax.__KOKO_PORTAL_PATCHED__ = true;
  }

  function boot() {
    patchBuyEntryVisibility();
    installFetchPatch();
    installAjaxPatch();
  }

  document.addEventListener("DOMContentLoaded", function () {
    boot();
    setInterval(patchBuyEntryVisibility, 1000);
  });

  setTimeout(boot, 300);
})();
</script>
<!-- KOKO_PORTAL_FRONTEND_PATCH_V1_END -->
