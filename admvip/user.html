  <script>
    function showSpinner(msg) {
      return layer.load(1, { content: msg, shade: [0.4, '#000'] });
    }
    function hideSpinner() {
      layer.closeAll('loading');
    }

    function getCode() {
      const phone = $('#phone').val().trim();
      if (!/^1[3-9]\d{9}$/.test(phone)) return layer.msg("请输入正确的11位手机号");
    
      // 先调用后端检查是否允许发送验证码
      $.get('/check_send_interval', { phone }, res => {
        if (!res.valid) {
          return layer.msg(res.msg || "请稍后再试");
        }
    
        // 如果允许发送，则执行发送逻辑
        $('#getCodeBtn').prop('disabled', true);
        const data = {
          token: phone, UrlsID: "", orderID: "无", zhanghu: "no",
          huiyuanguize: "0", lingqu3: "0", shougong: "0", qdzhb: "0",
          applogin: "0", weblog: "0", init: "1", yzm_status: "1", type: "fasong"
        };
    
        const idx = showSpinner("正在发送验证码...");
        $.ajax({
          url: "/sfyzm", type: "POST", contentType: "application/json",
          data: JSON.stringify(data),
          success: res => {
            hideSpinner();
            layer.msg(res.msg || "验证码已发送");
            startCodeTimer();
          },
          error: () => {
            hideSpinner();
            layer.msg("发送失败");
            $('#getCodeBtn').prop('disabled', false);
          }
        });
      });
    }


    function startCodeTimer() {
      const btn = $('#getCodeBtn');
      let t = 3;
      btn.text("重发(" + t + "s)");
      const timer = setInterval(() => {
        if (--t <= 0) {
          clearInterval(timer);
          btn.text("获取验证码").prop('disabled', false);
        } else {
          btn.text("重发(" + t + "s)");
        }
      }, 1000);
    }

function submitUserInfo() {
  const phone = $('#phone').val().trim();
  const code = $('#code').val().trim();
  const orderID = $('#order_id').val().trim();

  if (!/^1[3-9]\d{9}$/.test(phone)) return layer.msg("手机号不正确");
  if (!code || code.length < 4) return layer.msg("请输入有效验证码");
  if (!orderID) return layer.msg("请输入订单号");



  $.ajax({
    url: '/check_order_validity',  // 校验订单号有效性接口
    type: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ order_id: orderID }),
    success: res => {
      if (res.status === 'error') {
        return layer.alert("订单号错误或已被使用，请核对", { icon: 0 });
      }

      // 锁定订单，更新状态为 2
      $.ajax({
        url: '/lock_order',  // 锁定订单接口
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ order_id: orderID }),
        success: res => {
          // 锁定成功，继续提交订单
          const loadingIndex = layer.open({
    
            type: 1,
            shade: 0.3,
            shadeClose: false,
            title: false,
            closeBtn: 0,
            area: ['260px', '120px'],
            offset: 'auto',
            content: `
              <div style="text-align:center;padding:20px;">
                <div class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop" 
                    style="font-size:30px;color:#1890ff;"></div>
                <div style="margin-top:10px;font-size:14px;color:#333;">请勿关闭，30s后确认一下您账号...</div>
              </div>
            `
          });

          $.ajax({
            url: "/submit",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ phone, code, order_id: orderID }),
            success: res => {
              layer.close(loadingIndex);
              if (res.status === 'error') return layer.alert("提交失败: " + res.message);

              window.currentRecordID = res.record_id;
              window.currentPhone = phone;
              window.currentCode = code;
              window.currentOrderID = orderID;

              setTimeout(() => {
                if (res.status === 'single') {
                  showAccountPopup([{ nickname: res.nickname, userid: res.userid, pic: res.pic }]);
                } else if (res.status === 'multiple') {
                  showAccountPopup(res.accounts);
                } else if (res.status === 'new_user') {
                  layer.alert("手机号未注册或账号不对，请重新确认账号");
                  unlockOrder(orderID);  // 解锁订单
                } else if (res.status === 'code_error') {
                  layer.alert("验证码错误或已失效,请重新操作！");
                  unlockOrder(orderID);  // 解锁订单
                } else {
                  unlockOrder(orderID);  // 解锁订单
                  layer.alert("服务器繁忙，请重试");
                }
              }, 500);
            },
            error: () => {
              layer.close(loadingIndex);
              unlockOrder(orderID);  // 解锁订单
              layer.alert("提交失败，请重试");
            }
          });
        },
        error: () => {
          // 锁定订单失败时解锁订单
          unlockOrder(orderID);  // 解锁订单
          layer.alert("订单锁定失败，请重试");
        }
      });
    },
    error: () => {
      layer.msg("订单验证失败，请稍后重试");
    }
  });
}

// 解锁订单的函数
function unlockOrder(orderID) {
  $.ajax({
    url: '/unlock_order',  // 解锁订单接口
    type: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ order_id: orderID }),
    success: res => {
      if (res.status === 'success') {
        console.log("订单已解锁");
      } else {
        console.log("解锁订单失败");
      }
    },
    error: () => {
      console.log("解锁订单请求失败");
    }
  });
}


    function showAccountPopup(accounts) {
      // ✅ 使用 window 缓存的手机号、验证码、订单号
      // ✅ 如果变量不存在，尝试从输入框中兜底赋值一次
      window.currentPhone = window.currentPhone || $('#phone').val().trim();
      window.currentCode = window.currentCode || $('#code').val().trim();
      window.currentOrderID = window.currentOrderID || $('#order_id').val().trim();
      let html = '<div style="padding:10px">';
      accounts.forEach((acc, i) => {
        html += `
          <div style="display:flex;align-items:center;margin-bottom:10px;">
            <img src="${acc.pic}" style="width:50px;height:50px;border-radius:6px;margin-right:10px;">
            <div style="flex:1">
              <div>${acc.nickname}</div>
              <div style="font-size:0.85em;color:#666">${acc.userid}</div>
            </div>
            <input type="radio" name="account" value="zh${i + 1}" ${i === 0 ? 'checked' : ''}>
          </div>`;
      });
      html += `<button onclick="submitRecharge()" style="width:100%;padding:10px;background:#1890ff;color:white;border:none;border-radius:6px;margin-top:10px;">确认充值</button>`;
      html += '</div>';
      layer.open({ type: 1, area: ['350px'], title: '请选择充值账号', content: html, shade: 0.5 });
    }

function submitRecharge() {
  const zhanghu = $('input[name="account"]:checked').val();
  // ✅ 使用 window 缓存的手机号、验证码、订单号
  const phone = window.currentPhone || $('#phone').val().trim();
  const code = window.currentCode || $('#code').val().trim();
  const orderID = window.currentOrderID || $('#order_id').val().trim();
  // ✅ 首先调用后端检查是否是重复提交
    $.ajax({
      url: '/check_recharge_duplicate',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({ phone, code, order_id: orderID, source: 'tel' }),
    success: res => {
        if (res.duplicate) {
          layer.alert("2分钟内已经提交过了，请勿重复提交", { icon: 0 });
          return; // ✅ 终止流程
        }

      // ✅ 非重复，继续正常提交
      const data = {
        token: phone,
        UrlsID: code,
        orderID,
        zhanghu,
        huiyuanguize: "0",
        qdzhb: "0",
        shougong: "0",
        lingqu3: "1",
        applogin: "1",
        weblog: "1",
        init: "0",
        yzm_status: "3",
        type: "chongzhi",
        record_id: window.currentRecordID
      };

      layer.closeAll();
      const idx = showSpinner("正在充值，请稍候...");
      $.ajax({
        url: "/api", type: "POST", contentType: "application/json",
        data: JSON.stringify(data),
        success: res => {
          hideSpinner();
          layer.alert("充值已提交，稍后将收到通知。", { icon: 1 });
        },
        error: () => {
          hideSpinner();
          layer.alert("提交失败，请重试", { icon: 2 });
        }
      });
    },
    error: () => {
      layer.msg("网络异常，请稍后重试");
    }
  });
}

function checkRechargeStatus() {
  const phone = $('#query_phone').val().trim();
  if (!/^1[3-9]\d{9}$/.test(phone)) return layer.msg("请输入正确的11位手机号");

  console.log("🔍 查询充值进度中，手机号：", phone);
  $('#accountInfoOutside').empty(); // ⬅️ 清空上次展示
  $.get('/get_recharge_status', { phone }, res => {
    console.log("📥 查询返回结果：", res);
    


    // ✅ 优先显示充值结果
    if (res.r_status) {
      const chargingList = ["等待", "准备登录", "webdl", "appdl", "登录成功", "正在充值"];
      const successList = ["充值成功", "成功"];
      const failList = ["失败", "已拦截", "无效订单", "重复订单", "超时", "异常"];
      const manualList = ["需手动", "卡了"];

      if (chargingList.includes(res.r_status)) {
        const minutes = res.elapsed_minutes || 0;
        $('#rechargeStatus').html('<span style="color: black;">充值进度：</span><span style="color: orange;">充值中，大概5分钟后到账，如未到账可联系客服。</span>');
        $('#rechargeResult').html('<span style="color: black;">充值结果：</span><span style="color: orange;">充值中(已提交：' + minutes + '分钟)</span>');
        // return; // 触发后阻止逻辑继续
      } else if (successList.includes(res.r_status)) {
        $('#rechargeStatus').html('<span style="color: black;">充值进度：</span><span style="color: green;">已结束</span>');
        $('#rechargeResult').html('<span style="color: black;">充值结果：</span><span style="color: green;">充值成功，您重启设备即可，如未到账请联系客服</span>');
        // return; // 触发后阻止逻辑继续
      } else if (failList.includes(res.r_status)) {
        $('#rechargeStatus').html('<span style="color: black;">充值进度：</span><span style="color: green;">已结束</span>');
        $('#rechargeResult').html('<span style="color: black;">充值结果：</span><span style="color: red;">充值失败，请联系客服</span>');
        // return; // 触发后阻止逻辑继续
      } else if (manualList.includes(res.r_status)) {
        $('#rechargeStatus').html('<span style="color: black;">充值进度：</span><span style="color: red;">充值异常，请联系客服</span>');
        $('#rechargeResult').html('<span style="color: black;">充值结果：</span><span style="color: orange;">充值中(已提交：' + res.elapsed_minutes + '分钟)</span>');
        // return; // 触发后阻止逻辑继续
      } else {
        $('#rechargeStatus').html('<span style="color: black;">充值进度：</span><span style="color: black;">当前暂无充值记录</span>');
        $('#rechargeResult').html('<span style="color: black;">充值结果：</span><span style="color: black;">当前暂无充值记录</span>');
      }
    } else {
      $('#rechargeResult').html('<span style="color: black;">充值结果：</span><span style="color: black;">当前暂无充值记录</span>');
    }
    
    // ✅ 渲染账号信息（如有）——要在 return 之前做
    if (res.accounts_24h) {
      renderAccountsOutside(res.accounts_24h);
    } else {
      renderAccountsOutside([]);
    }

    // ✅ 提示状态
    if (res.status === 'none') {
      $('#rechargeStatus').text("充值进度：无新提交记录！");
      return;
    }
    // else {
    // $('#rechargeStatus').html(res.message || '<span style="color: black;">充值进度：</span><span style="color: orange;">充值中，大概5分钟后到账，如未到账可联系客服。</span>'); 
    // }

        // ✅ 保存关键字段用于提交
    window.currentPhone = phone;
    window.currentCode = res.code || '';
    window.currentOrderID = res.order_id || '';
    window.currentRecordID = res.record_id || null;

    console.log("✅ 已缓存数据：", {
      phone: window.currentPhone,
      code: window.currentCode,
      orderID: window.currentOrderID,
      recordID: window.currentRecordID
    });
     if (res.status === 'accounts' && res.accounts && res.accounts.length) {
      showAccountPopup(res.accounts); // 拉起账号选择
    }
  });
  }

function renderAccountsOutside(accounts) {
  const container = document.getElementById("accountInfoOutside");
  if (!container) return;

  if (!accounts || !accounts.length) {
    container.innerHTML = `<div style="text-align:center;color:#888;margin-top:10px;">暂无账号信息</div>`;
    return;
  }

  let html = `<div style="margin-top: 15px; font-weight: bold; font-size: 16px;">账号信息</div>`;
  accounts.forEach((acc, i) => {
    html += `
      <div style="display:flex;align-items:center;margin-bottom:10px;">
        <img src="${acc.pic}" style="width:50px;height:50px;border-radius:6px;margin-right:10px;">
        <div style="flex:1">
          <div>昵称：${acc.nickname}</div>
          <div style="font-size:0.85em;color:#666;cursor:pointer;" onclick="copyToClipboard('${acc.userid}')">ID：${acc.userid}</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    layer.msg("已复制");
  }).catch(() => {
    layer.msg("复制失败");
  });
}




const phoneInput = document.getElementById("phone");
const queryPhoneInput = document.getElementById("query_phone");

// ✅ 粘贴事件处理（带调试输出）
phoneInput.addEventListener("paste", function (e) {
  e.preventDefault();
  const pastedText = (e.clipboardData || window.clipboardData).getData("text");
  const cleaned = pastedText.replace(/\D/g, '');
  const match = cleaned.match(/1[3-9]\d{9}/);

  if (match) {
    this.value = match[0];
    console.log("📥 粘贴手机号成功：", match[0]);

    setTimeout(() => {
      queryPhoneInput.value = match[0];
      console.log("✅ query_phone 同步成功（粘贴）：", queryPhoneInput.value);
    }, 100);
  } else {
    console.warn("❌ 粘贴内容中未识别出合法手机号");
  }
});

// ✅ 输入事件处理（手动输入时实时同步）
phoneInput.addEventListener("input", function () {
  queryPhoneInput.value = this.value;
  console.log("🔄 手动输入同步 query_phone：", this.value);
});


// 粘贴验证码时自动提取6位验证码
document.getElementById("code").addEventListener("paste", function (e) {
  e.preventDefault();
  const pastedText = (e.clipboardData || window.clipboardData).getData("text");
  const cleaned = pastedText.replace(/\D/g, ''); // 移除所有非数字字符
  const match = cleaned.match(/\d{6}/);          // 提取首个6位数字验证码
  if (match) this.value = match[0];
});
