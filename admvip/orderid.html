<style>

  .main-wrapper {

  flex-direction: column;

}

#accountInfoOutsideWrapper {

  height: 100vh;

}

  	/* 设置订单号输入框预选信息样式*/	
	.preset-item {
    padding: 5px;
    cursor: pointer;
  }

  .preset-item:hover {
    background-color: #f0f0f0;
  }

#presetList {
  display: none;
  position: absolute;
  top: 35px;
  width: 120px;
  max-height: 300px;
  overflow-y: auto;
  border: 1px solid #ccc;

  max-width: 95vw;
}
  .preset-item {
    padding: 14px 16px;
    font-size: 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    user-select: none;
  }

  .preset-item:last-child {

  }

  }

  .preset-item:hover {

  }

.preset-item .spech {

}
.preset-item .specc {
  color: #1E9FFF;
  font-style: bold;

<body>
<div class="main-wrapper">
<div class="container">
<div class="form-group">
<label>规格</label>
<select id="order_type" onchange="updatePrices()">
<option value="">请选择</option>
<option value="hh1">h1</option>
<option value="hh3">h3</option>
<option value="hh12">h12</option>
<option value="cj1">c1</option>
<option value="cj3">c3</option>
<option value="cj12">c12</option>
</select>
</div>
<div class="form-group">
<label>价格</label>
<select id="order_price"></select>
</div>
<div class="form-group">
<label>数量</label>
<select id="order_quantity">
<option value="1">1</option>
<option value="5">5</option>
<option value="10">10</option>
<option value="20">20</option>
<option value="50">50</option>
<option value="100">100</option>
</select>
</div>
<button class="btn2" onclick="extractOrderIDs()">提取订单号</button>
<div id="orderIDResult"></div>
<div class="form-group">
<label>查询订单号</label>
<input id="detail_order_id" placeholder="输入订单号"/>
</div>
<button class="btn2" onclick="queryOrderDetails()">查询明细</button>
<div id="orderDetailsResult"></div>
</div>
</div>
<script>
    function showSpinner(msg) {
      return layer.load(1, { content: msg, shade: [0.4, '#000'] });
    }
    function hideSpinner() {
      layer.closeAll('loading');
    }

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    layer.msg("已复制");
  }).catch(() => {
    layer.msg("复制失败");
  });
}


// 点击输入框时清空内容
['detail_order_id'].forEach(id => {
  const input = document.getElementById(id);
  input.addEventListener('focus', () => {
    input.value = '';
  });
});
  // 防止键盘弹出时页面跳动
  document.querySelectorAll('input, textarea').forEach(input => {
    input.addEventListener('focus', () => {
      document.body.style.position = 'fixed';
    });
    input.addEventListener('blur', () => {
      document.body.style.position = '';
    });
  });
const input = document.getElementById('detail_order_id');  // ✅ 修正 id
//const presetList = document.getElementById('presetList');


// 点击预设项时仅填入 data-order 的值
document.querySelectorAll('.preset-item').forEach(item => {
  item.addEventListener('click', () => {
    const order = item.getAttribute('data-order');
    input.value = order;
    presetList.style.display = 'none';
  });
});

// 点击输入框外隐藏列表（需确保 presetList 外有 class="orderIDDiv" 的父级包裹）

  



/*----------orderid逻辑----------------------*/
const priceMap = {
  hh1: [5.8, 9.8, 10.8],
  hh3: [21.8, 23.8, 27.8],
  hh12: [92.8, 115],
  cj1: [8.8, 11.9, 12.9, 14.9, 18.9],
  cj3: [32.8, 52.8],
  cj12: [125, 128, 168]
};

function updatePrices() {
  const type = document.getElementById('order_type').value;
  const priceSelect = document.getElementById('order_price');
  priceSelect.innerHTML = '';
  if (priceMap[type]) {
    priceMap[type].forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.text = p;
      priceSelect.appendChild(opt);
    });
  }
}

function extractOrderIDs() {
  const type = $('#order_type').val();
  const price = $('#order_price').val();
  const quantity = $('#order_quantity').val();
  if (!type || !price || !quantity) return layer.msg("请填写完整");

  $.ajax({
    url: '/extract_order_ids',
    type: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ type, price, quantity }),
    success: res => {
      if (res.code === 200) {
        const ids = res.data.join('\n');
        navigator.clipboard.writeText(ids).then(() => {
          // 弹出带滚动条的提示框
          layer.open({
            type: 1,
            title: '订单号已复制到剪切板',
            area: ['80%', '300px'],
            content: `<div style="padding:10px; overflow-y:auto; max-height:260px; word-break:break-all;">${ids.replace(/\n/g, '<br>')}</div>`
          });
        });
      } else {
        layer.alert(res.msg || "提取失败");
      }
    },
    error: () => {
      layer.alert("网络异常");
    }
  });
}

function queryOrderDetails() {
  const id = $('#detail_order_id').val().trim();
  if (!id) return layer.msg("请输入订单号");

  $.get('/order_id_query', { orderID: id }, res => {
    if (res.code === 200 && res.data.length) {
      const html = res.data.map(d => `<div style="margin-bottom:10px;">${d}</div>`).join('');
      layer.open({
        type: 1,
        title: '订单号明细结果',
        area: ['80%', '300px'],
        content: `<div style="padding:10px; overflow-y:auto; max-height:260px;">${html}</div>`
      });
    } else {
      layer.alert("无记录");
    }
  });
}

</script>
</body>
</html>
